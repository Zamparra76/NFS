<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>NFS NAV</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    font-family: 'Arial Narrow', Arial, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }
  #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  .mapboxgl-canvas { filter: brightness(0.85) contrast(1.1); }

  #waypoint-arrow {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 64px;
    height: 64px;
    z-index: 100;
    filter: drop-shadow(0 0 12px #00aaff) drop-shadow(0 0 24px #0055ff);
    display: none;
    pointer-events: none;
  }
  #top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 90px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
    z-index: 50;
    pointer-events: none;
  }
  #bottom-hud {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px 24px;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #instruction-box {
    background: rgba(0, 10, 30, 0.85);
    border: 1px solid rgba(0, 170, 255, 0.4);
    border-left: 3px solid #00aaff;
    border-radius: 4px;
    padding: 10px 14px;
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.5px;
    display: none;
    box-shadow: 0 0 20px rgba(0, 100, 255, 0.2), inset 0 0 20px rgba(0, 50, 150, 0.1);
  }
  #instruction-box .distance {
    color: #00aaff;
    font-size: 13px;
    font-weight: normal;
    margin-top: 2px;
  }
  #stats-row { display: flex; gap: 10px; }
  .stat-box {
    flex: 1;
    background: rgba(0, 10, 30, 0.8);
    border: 1px solid rgba(0, 170, 255, 0.25);
    border-radius: 4px;
    padding: 8px 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0, 100, 255, 0.15);
  }
  .stat-label { color: rgba(0, 170, 255, 0.7); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
  .stat-value { color: #fff; font-size: 20px; font-weight: bold; line-height: 1.2; }
  .stat-unit { color: rgba(255,255,255,0.5); font-size: 10px; }

  #search-panel {
    position: absolute;
    top: 10px; left: 10px; right: 10px;
    z-index: 200;
    display: flex;
    gap: 8px;
  }
  #destination-input {
    flex: 1;
    background: rgba(0, 10, 30, 0.92);
    border: 1px solid rgba(0, 170, 255, 0.5);
    border-radius: 4px;
    color: #fff;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    letter-spacing: 0.3px;
    box-shadow: 0 0 15px rgba(0, 100, 255, 0.2);
  }
  #destination-input::placeholder { color: rgba(0, 170, 255, 0.5); }
  #destination-input:focus { border-color: #00aaff; }
  #go-btn {
    background: rgba(0, 100, 255, 0.8);
    border: 1px solid rgba(0, 170, 255, 0.7);
    border-radius: 4px;
    color: #fff;
    font-size: 13px;
    font-weight: bold;
    padding: 10px 16px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 0 15px rgba(0, 100, 255, 0.4);
    white-space: nowrap;
  }
  #go-btn:active { background: rgba(0, 60, 200, 0.9); }

  #suggestions {
    position: absolute;
    top: 44px; left: 0; right: 60px;
    background: rgba(0, 10, 30, 0.97);
    border: 1px solid rgba(0, 170, 255, 0.3);
    border-top: none;
    border-radius: 0 0 4px 4px;
    z-index: 300;
    display: none;
    max-height: 200px;
    overflow-y: auto;
  }
  .suggestion-item {
    padding: 10px 14px;
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid rgba(0, 170, 255, 0.1);
  }
  .suggestion-item:hover { background: rgba(0, 100, 255, 0.2); color: #fff; }

  #cancel-btn {
    position: absolute;
    bottom: 130px; right: 16px;
    background: rgba(200, 0, 0, 0.7);
    border: 1px solid rgba(255, 50, 50, 0.5);
    border-radius: 4px;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    padding: 8px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    z-index: 100;
    display: none;
    box-shadow: 0 0 12px rgba(200, 0, 0, 0.3);
  }

  #gps-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .gps-pulse {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 3px solid #00aaff;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(0.8); opacity: 1; box-shadow: 0 0 0 0 rgba(0,170,255,0.5); }
    100% { transform: scale(1.4); opacity: 0; box-shadow: 0 0 0 20px rgba(0,170,255,0); }
  }
  #gps-text { color: rgba(0, 170, 255, 0.9); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; }

  .mapboxgl-ctrl-attrib { font-size: 9px !important; opacity: 0.4 !important; }
  .mapboxgl-ctrl-logo { display: none !important; }
</style>
</head>
<body>

<div id="gps-overlay">
  <div class="gps-pulse"></div>
  <div id="gps-text">GPS SİNYALİ ARANYOR...</div>
</div>

<div id="map"></div>
<div id="top-bar"></div>
<canvas id="waypoint-arrow" width="64" height="64"></canvas>

<div id="search-panel">
  <input type="text" id="destination-input" placeholder="Hedef ara..." autocomplete="off" />
  <button id="go-btn">GİT</button>
  <div id="suggestions"></div>
</div>

<div id="bottom-hud">
  <div id="instruction-box">
    <div id="instruction-text">Hedefe gidin</div>
    <div class="distance" id="instruction-dist"></div>
  </div>
  <div id="stats-row">
    <div class="stat-box">
      <div class="stat-label">MESAFE</div>
      <div class="stat-value" id="stat-dist">--</div>
      <div class="stat-unit">km</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">TAHMİNİ</div>
      <div class="stat-value" id="stat-eta">--</div>
      <div class="stat-unit">dk</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">HIZ</div>
      <div class="stat-value" id="stat-speed">0</div>
      <div class="stat-unit">km/s</div>
    </div>
  </div>
</div>

<button id="cancel-btn">✕ İPTAL</button>

<!-- Mapbox body sonunda yüklensin -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script>
const MAPBOX_TOKEN = 'pk.eyJ1IjoiemFtcGFycmE3NiIsImEiOiJjbXFydGdld2EwMTR3MnFzNTlrM3RzNXp5In0.nngUVvOjsfws28L6wrJfSg';

let userLng = null, userLat = null, userBearing = 0;
let destLng = null, destLat = null;
let routeSteps = [], currentStepIdx = 0;
let map, userMarker, destMarkerEl = null;
let isNavigating = false;
let lastPos = null, lastTime = null;
let speedKmh = 0;

function init() {
  mapboxgl.accessToken = MAPBOX_TOKEN;

  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/navigation-night-v1',
    center: [28.97, 41.01],
    zoom: 15,
    pitch: 45,
    bearing: 0,
    antialias: true
  });

  map.on('load', () => {
    startGPS();
  });

  document.getElementById('cancel-btn').addEventListener('click', cancelNavigation);
  document.getElementById('go-btn').addEventListener('click', onGoBtn);
  document.getElementById('destination-input').addEventListener('input', onSearchInput);
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#search-panel')) document.getElementById('suggestions').style.display = 'none';
  });
}

// Yeşil üçgen marker
function createUserMarkerEl() {
  const el = document.createElement('div');
  el.innerHTML = `<svg width="32" height="40" viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="16,2 30,36 16,28 2,36" fill="#00ff88" stroke="#00cc66" stroke-width="1.5"/>
  </svg>`;
  el.style.filter = 'drop-shadow(0 0 6px #00ff88) drop-shadow(0 0 12px #00aa55)';
  el.style.width = '32px';
  el.style.height = '40px';
  el.style.transformOrigin = '50% 70%';
  return el;
}

// Mavi 3D ok çiz
function drawWaypointArrow(angleDeg) {
  const canvas = document.getElementById('waypoint-arrow');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 64, 64);
  ctx.save();
  ctx.translate(32, 32);
  ctx.rotate((angleDeg * Math.PI) / 180);
  ctx.shadowColor = '#00aaff';
  ctx.shadowBlur = 18;
  ctx.beginPath();
  ctx.moveTo(0, -22);
  ctx.lineTo(13, 2);
  ctx.lineTo(6, 2);
  ctx.lineTo(6, 18);
  ctx.lineTo(-6, 18);
  ctx.lineTo(-6, 2);
  ctx.lineTo(-13, 2);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, -22, 0, 18);
  grad.addColorStop(0, '#66ddff');
  grad.addColorStop(0.4, '#0088ff');
  grad.addColorStop(1, '#003399');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#aaddff';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();
}

function bearingTo(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const dLon = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
            Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(m) {
  return m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`;
}

async function fetchRoute(olng, olat, dlng, dlat) {
  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${olng},${olat};${dlng},${dlat}?steps=true&geometries=geojson&language=tr&access_token=${MAPBOX_TOKEN}`;
  const res = await fetch(url);
  const data = await res.json();
  if (!data.routes || !data.routes.length) { alert('Rota bulunamadı.'); return null; }
  return data.routes[0];
}

function drawRoute(geojson) {
  if (map.getSource('route')) {
    map.getSource('route').setData({ type: 'Feature', geometry: geojson });
  } else {
    map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: geojson } });
    map.addLayer({ id: 'route-glow', type: 'line', source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': '#0066ff', 'line-width': 10, 'line-opacity': 0.35 } });
    map.addLayer({ id: 'route-line', type: 'line', source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': '#00aaff', 'line-width': 4, 'line-opacity': 0.9 } });
  }
}

function setDestMarker(lng, lat) {
  if (destMarkerEl) destMarkerEl.remove();
  const el = document.createElement('div');
  el.innerHTML = `<svg width="28" height="36" viewBox="0 0 28 36"><circle cx="14" cy="14" r="12" fill="#ff3300" stroke="#ff6644" stroke-width="2"/><line x1="14" y1="26" x2="14" y2="34" stroke="#ff3300" stroke-width="2"/></svg>`;
  el.style.filter = 'drop-shadow(0 0 8px #ff3300)';
  destMarkerEl = new mapboxgl.Marker({ element: el, anchor: 'bottom' }).setLngLat([lng, lat]).addTo(map);
}

async function startNavigation() {
  if (!userLat || !destLat) return;
  const route = await fetchRoute(userLng, userLat, destLng, destLat);
  if (!route) return;

  routeSteps = route.legs[0].steps;
  currentStepIdx = 0;
  isNavigating = true;

  drawRoute(route.geometry);
  setDestMarker(destLng, destLat);

  document.getElementById('stat-dist').textContent = (route.distance / 1000).toFixed(1);
  document.getElementById('stat-eta').textContent = Math.round(route.duration / 60);
  document.getElementById('instruction-box').style.display = 'block';
  document.getElementById('cancel-btn').style.display = 'block';
  document.getElementById('waypoint-arrow').style.display = 'block';

  updateInstruction();
  updateArrow();
}

function updateInstruction() {
  if (!routeSteps.length) return;
  const step = routeSteps[Math.min(currentStepIdx, routeSteps.length - 1)];
  document.getElementById('instruction-text').textContent = step.maneuver.instruction || 'Devam edin';
  document.getElementById('instruction-dist').textContent = fmtDist(step.distance);
}

function updateArrow() {
  if (!isNavigating || !userLat || !destLat) return;
  const abs = bearingTo(userLat, userLng, destLat, destLng);
  const rel = (abs - userBearing + 360) % 360;
  drawWaypointArrow(rel);
}

function cancelNavigation() {
  isNavigating = false;
  routeSteps = [];
  currentStepIdx = 0;
  destLat = destLng = null;
  if (map.getLayer('route-line')) map.removeLayer('route-line');
  if (map.getLayer('route-glow')) map.removeLayer('route-glow');
  if (map.getSource('route')) map.removeSource('route');
  if (destMarkerEl) { destMarkerEl.remove(); destMarkerEl = null; }
  document.getElementById('instruction-box').style.display = 'none';
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('waypoint-arrow').style.display = 'none';
  document.getElementById('stat-dist').textContent = '--';
  document.getElementById('stat-eta').textContent = '--';
  map.easeTo({ pitch: 45, bearing: 0 });
}

function onPosition(pos) {
  const { latitude, longitude, speed, heading } = pos.coords;

  if (speed !== null && speed !== undefined && speed >= 0) {
    speedKmh = Math.round(speed * 3.6);
  } else if (lastPos && lastTime) {
    const dt = (Date.now() - lastTime) / 1000;
    const d = distanceKm(lastPos.lat, lastPos.lng, latitude, longitude) * 1000;
    if (dt > 0) speedKmh = Math.round((d / dt) * 3.6);
  }
  document.getElementById('stat-speed').textContent = speedKmh;

  if (heading !== null && heading !== undefined && heading >= 0) userBearing = heading;

  const moved = !userLat || distanceKm(userLat, userLng, latitude, longitude) > 0.002;
  userLat = latitude; userLng = longitude;
  lastPos = { lat: latitude, lng: longitude };
  lastTime = Date.now();

  document.getElementById('gps-overlay').style.display = 'none';

  if (!userMarker) {
    const el = createUserMarkerEl();
    userMarker = new mapboxgl.Marker({ element: el, anchor: 'center', rotationAlignment: 'map' })
      .setLngLat([longitude, latitude]).addTo(map);
    map.setCenter([longitude, latitude]);
  } else {
    userMarker.setLngLat([longitude, latitude]);
    userMarker.setRotation(userBearing);
  }

  if (isNavigating && moved) {
    map.easeTo({ center: [longitude, latitude], bearing: userBearing, pitch: 50, duration: 800 });
  } else if (!isNavigating) {
    map.easeTo({ center: [longitude, latitude], duration: 500 });
  }

  if (isNavigating && routeSteps.length) {
    const step = routeSteps[Math.min(currentStepIdx, routeSteps.length - 1)];
    const stepEnd = step.maneuver.location;
    const distToStep = distanceKm(latitude, longitude, stepEnd[1], stepEnd[0]) * 1000;
    if (distToStep < 30 && currentStepIdx < routeSteps.length - 1) {
      currentStepIdx++;
      updateInstruction();
    }
    const distToDest = distanceKm(latitude, longitude, destLat, destLng) * 1000;
    if (distToDest < 40) {
      alert('🏁 Hedefe ulaştınız!');
      cancelNavigation();
    }
  }

  updateArrow();
}

function onGpsError(err) {
  document.getElementById('gps-text').textContent = 'GPS HATASI: ' + err.message;
}

function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gps-text').textContent = 'GPS DESTEKLENMIYOR';
    return;
  }
  navigator.geolocation.watchPosition(onPosition, onGpsError, {
    enableHighAccuracy: true, timeout: 15000, maximumAge: 0
  });
}

let searchTimeout = null;

async function onSearchInput() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('destination-input').value.trim();
  const suggestions = document.getElementById('suggestions');
  if (q.length < 3) { suggestions.style.display = 'none'; return; }
  searchTimeout = setTimeout(async () => {
    const proximity = userLng ? `&proximity=${userLng},${userLat}` : '';
    const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?language=tr&limit=5${proximity}&access_token=${MAPBOX_TOKEN}`;
    const res = await fetch(url);
    const data = await res.json();
    suggestions.innerHTML = '';
    if (!data.features || !data.features.length) { suggestions.style.display = 'none'; return; }
    data.features.forEach(f => {
      const item = document.createElement('div');
      item.className = 'suggestion-item';
      item.textContent = f.place_name;
      item.addEventListener('click', () => {
        document.getElementById('destination-input').value = f.place_name;
        suggestions.style.display = 'none';
        destLng = f.center[0]; destLat = f.center[1];
        startNavigation();
      });
      suggestions.appendChild(item);
    });
    suggestions.style.display = 'block';
  }, 400);
}

async function onGoBtn() {
  const q = document.getElementById('destination-input').value.trim();
  if (!q) return;
  document.getElementById('suggestions').style.display = 'none';
  const proximity = userLng ? `&proximity=${userLng},${userLat}` : '';
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?language=tr&limit=1${proximity}&access_token=${MAPBOX_TOKEN}`;
  const res = await fetch(url);
  const data = await res.json();
  if (!data.features || !data.features.length) { alert('Yer bulunamadı.'); return; }
  const f = data.features[0];
  destLng = f.center[0]; destLat = f.center[1];
  startNavigation();
}

// Başlat
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
