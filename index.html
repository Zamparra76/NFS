<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>NFSU NAV SYSTEMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <style>
    :root{
      --bg:#000;
      --panel: rgba(8, 12, 18, 0.92);
      --panel2: rgba(2, 4, 8, 0.96);
      --line: rgba(94, 182, 255, 0.30);
      --blue:#42a5ff;
      --blue2:#78c8ff;
      --green:#2efc78;
      --red:#ff4e5f;
      --text:#e8f4ff;
      --muted:#8ca3b8;
      --shadow: 0 0 18px rgba(66,165,255,.18);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      overflow:hidden;
      font-family:"Rajdhani",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    body{
      overscroll-behavior:none;
    }
    button,input{
      font:inherit;
    }
    #map{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      background:#000;
    }
    #app{
      position:fixed;
      inset:0;
      opacity:0;
      transition: opacity .45s ease;
    }
    #app.ready{
      opacity:1;
    }
    #splash{
      position:fixed;
      inset:0;
      background:#000;
      display:grid;
      place-items:center;
      z-index:50;
      transition: opacity .45s ease, visibility .45s ease;
    }
    #splash.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }
    .splash-inner{
      width:min(84vw, 360px);
      text-align:center;
    }
    .splash-title{
      font-family:"Orbitron",sans-serif;
      letter-spacing:0.28em;
      text-transform:uppercase;
      color:#fff;
      font-size:clamp(1.05rem, 4.2vw, 1.55rem);
      line-height:1.3;
      text-shadow:0 0 14px rgba(66,165,255,.20);
    }
    .progress-track{
      margin:18px auto 0;
      width:100%;
      height:2px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      border-radius:999px;
      box-shadow:0 0 0 1px rgba(66,165,255,.08);
    }
    .progress-bar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, rgba(66,165,255,.18), rgba(66,165,255,1), rgba(120,200,255,1));
      box-shadow:0 0 16px rgba(66,165,255,.9);
      animation: loadBar 3s linear forwards;
    }
    @keyframes loadBar{to{width:100%;}}
    .top-shell{
      position:fixed;
      top:calc(10px + var(--safe-top));
      left:10px;
      right:10px;
      z-index:20;
      pointer-events:none;
    }
    .search-wrap{
      width:min(100%, 680px);
      margin:0 auto;
      pointer-events:auto;
      transition: transform .32s ease, opacity .32s ease;
    }
    .search-box{
      display:flex;
      align-items:center;
      gap:10px;
      background:linear-gradient(180deg, rgba(8,12,18,.96), rgba(0,0,0,.90));
      border:1px solid rgba(66,165,255,.35);
      border-radius:14px;
      padding:12px 14px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(6px);
    }
    .search-icon{
      width:14px;
      height:14px;
      border:2px solid var(--blue2);
      border-radius:50%;
      position:relative;
      flex:0 0 auto;
      opacity:.95;
    }
    .search-icon::after{
      content:"";
      position:absolute;
      width:8px;
      height:2px;
      background:var(--blue2);
      transform:rotate(45deg);
      right:-7px;
      bottom:-3px;
      border-radius:999px;
    }
    #searchInput{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-family:"Orbitron",sans-serif;
      font-size:clamp(.8rem, 3.1vw, .95rem);
    }
    #searchInput::placeholder{
      color:#6e89a1;
      opacity:1;
    }
    .suggestions{
      margin-top:8px;
      max-height:min(42vh, 320px);
      overflow:auto;
      display:none;
      background:linear-gradient(180deg, rgba(8,12,18,.96), rgba(0,0,0,.92));
      border:1px solid rgba(66,165,255,.24);
      border-radius:12px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(6px);
    }
    .suggestions.show{display:block;}
    .suggestion{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.06);
      cursor:pointer;
      transition: background .16s ease, transform .16s ease;
    }
    .suggestion:last-child{border-bottom:0}
    .suggestion:active{
      background:rgba(66,165,255,.15);
      transform:scale(.99);
    }
    .suggestion .name{
      font-family:"Orbitron",sans-serif;
      font-size:.78rem;
      letter-spacing:.07em;
      color:#fff;
      text-transform:uppercase;
    }
    .suggestion .meta{
      margin-top:2px;
      font-size:.86rem;
      color:var(--muted);
      letter-spacing:.03em;
    }
    .start-card{
      width:min(100%, 680px);
      margin:10px auto 0;
      pointer-events:auto;
      background:linear-gradient(180deg, rgba(8,12,18,.96), rgba(0,0,0,.92));
      border:1px solid rgba(66,165,255,.22);
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:12px 14px;
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      backdrop-filter: blur(6px);
    }
    .start-card.show{display:flex;}
    .dest-copy{
      min-width:0;
    }
    .dest-copy .label{
      font-family:"Orbitron",sans-serif;
      font-size:.72rem;
      letter-spacing:.18em;
      color:var(--blue2);
      text-transform:uppercase;
      margin-bottom:4px;
    }
    .dest-copy .value{
      font-size:1rem;
      letter-spacing:.03em;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .dest-copy .sub{
      margin-top:2px;
      font-size:.82rem;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .action-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }
    .btn{
      border:1px solid rgba(66,165,255,.34);
      background:linear-gradient(180deg, rgba(10,14,20,.98), rgba(0,0,0,.94));
      color:#fff;
      border-radius:12px;
      padding:11px 14px;
      letter-spacing:.14em;
      text-transform:uppercase;
      font-family:"Orbitron",sans-serif;
      font-size:.72rem;
      cursor:pointer;
      box-shadow:var(--shadow);
      transition: transform .16s ease, border-color .16s ease, background .16s ease, opacity .16s ease;
    }
    .btn:active{transform:scale(.98)}
    .btn.primary{
      background:linear-gradient(180deg, rgba(21,43,64,.98), rgba(0,0,0,.95));
      border-color:rgba(120,200,255,.55);
    }
    .btn.danger{
      border-color:rgba(255,78,95,.45);
      background:linear-gradient(180deg, rgba(60,14,22,.98), rgba(0,0,0,.95));
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .stop-wrap{
      position:fixed;
      top:calc(10px + var(--safe-top));
      right:10px;
      z-index:22;
      opacity:0;
      transform:translateY(-12px);
      pointer-events:none;
      transition: opacity .28s ease, transform .28s ease;
    }
    .stop-wrap.show{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }
    .stop-wrap .btn{
      padding:11px 13px;
    }
    .dest-pointer{
      position:fixed;
      top:calc(14px + var(--safe-top));
      left:50%;
      transform:translateX(-50%);
      z-index:21;
      display:none;
      width:56px;
      height:56px;
      pointer-events:none;
      filter:drop-shadow(0 0 10px rgba(66,165,255,.6));
    }
    .dest-pointer.show{display:block;}
    .dest-triangle{
      position:absolute;
      left:50%;
      top:6px;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:13px solid transparent;
      border-right:13px solid transparent;
      border-bottom:24px solid var(--blue);
      transform-origin:50% 60%;
    }
    .dest-label{
      position:absolute;
      bottom:3px;
      left:50%;
      transform:translateX(-50%);
      font-family:"Orbitron",sans-serif;
      font-size:.62rem;
      letter-spacing:.18em;
      color:var(--blue2);
      text-transform:uppercase;
      white-space:nowrap;
    }
    .sensor-prompt{
      position:fixed;
      left:50%;
      bottom:calc(96px + var(--safe-bottom));
      transform:translateX(-50%);
      z-index:18;
      width:min(calc(100vw - 24px), 420px);
      background:linear-gradient(180deg, rgba(8,12,18,.96), rgba(0,0,0,.94));
      border:1px solid rgba(66,165,255,.24);
      border-radius:16px;
      padding:14px;
      box-shadow:var(--shadow);
      display:none;
      text-align:center;
    }
    .sensor-prompt.show{display:block;}
    .sensor-prompt .title{
      font-family:"Orbitron",sans-serif;
      letter-spacing:.18em;
      text-transform:uppercase;
      font-size:.74rem;
      color:#fff;
    }
    .sensor-prompt .copy{
      margin-top:8px;
      font-size:.95rem;
      color:var(--muted);
    }
    .sensor-prompt .btn{
      margin-top:12px;
      width:100%;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:calc(218px + var(--safe-bottom));
      transform:translateX(-50%);
      z-index:30;
      background:rgba(0,0,0,.90);
      color:#fff;
      border:1px solid rgba(66,165,255,.35);
      border-radius:999px;
      padding:10px 14px;
      box-shadow:var(--shadow);
      font-size:.92rem;
      letter-spacing:.02em;
      max-width:min(92vw, 520px);
      text-align:center;
      display:none;
    }
    .toast.show{display:block;}
    .hud{
      position:fixed;
      left:10px;
      right:10px;
      bottom:calc(10px + var(--safe-bottom));
      z-index:19;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      pointer-events:none;
    }
    .stat{
      background:linear-gradient(180deg, rgba(8,12,18,.96), rgba(0,0,0,.94));
      border:1px solid rgba(66,165,255,.22);
      border-radius:16px;
      padding:12px 10px 10px;
      box-shadow:var(--shadow);
      text-align:center;
    }
    .stat span{
      display:block;
      font-family:"Orbitron",sans-serif;
      font-size:.62rem;
      letter-spacing:.2em;
      color:var(--blue2);
      text-transform:uppercase;
      margin-bottom:6px;
    }
    .stat strong{
      font-family:"Orbitron",sans-serif;
      font-size:clamp(.88rem, 3.7vw, 1.12rem);
      letter-spacing:.08em;
      color:#fff;
      font-weight:700;
    }
    .search-hidden .search-wrap{
      transform:translateY(-120%);
      opacity:0;
      pointer-events:none;
    }
    .search-hidden .start-card{
      transform:translateY(-120%);
      opacity:0;
      pointer-events:none;
    }
    .mapboxgl-ctrl-bottom-left,
    .mapboxgl-ctrl-bottom-right{
      display:none !important;
    }
    .marker-wrap{
      width:0;
      height:0;
      position:relative;
      pointer-events:none;
    }
    .marker-vehicle,
    .marker-dest{
      position:absolute;
      left:0;
      top:0;
      transform-origin:50% 60%;
      will-change:transform;
    }
    .marker-vehicle{
      width:0;
      height:0;
      border-left:12px solid transparent;
      border-right:12px solid transparent;
      border-bottom:24px solid var(--green);
      filter:drop-shadow(0 0 8px rgba(46,252,120,.5));
    }
    .marker-dest{
      width:0;
      height:0;
      border-left:11px solid transparent;
      border-right:11px solid transparent;
      border-top:22px solid #59b6ff;
      filter:drop-shadow(0 0 8px rgba(89,182,255,.6));
    }
    .marker-vehicle::after,
    .marker-dest::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#000;
      transform:translate(-50%,-30%);
      box-shadow:0 0 0 1px rgba(255,255,255,.05);
      opacity:.35;
    }
    .app-note{
      position:fixed;
      left:50%;
      top:calc(74px + var(--safe-top));
      transform:translateX(-50%);
      z-index:16;
      font-family:"Orbitron",sans-serif;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:.62rem;
      color:rgba(255,255,255,.65);
      pointer-events:none;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.06);
      border-radius:999px;
      padding:6px 10px;
      backdrop-filter: blur(6px);
      display:none;
    }
    .app-note.show{display:block;}
    @media (min-width: 768px){
      .top-shell, .hud{
        left:16px;
        right:16px;
      }
      .stop-wrap{
        right:16px;
      }
      .sensor-prompt{
        bottom:calc(100px + var(--safe-bottom));
      }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-title">NFSU NAV SYSTEMS</div>
      <div class="progress-track"><div class="progress-bar"></div></div>
    </div>
  </div>

  <div id="app">
    <div id="map"></div>

    <div class="top-shell" id="topShell">
      <div class="search-wrap" id="searchWrap">
        <div class="search-box">
          <div class="search-icon"></div>
          <input id="searchInput" type="text" spellcheck="false" autocomplete="off" autocapitalize="characters" placeholder="ENTER DESTINATION / PLUS CODE" />
        </div>
        <div id="suggestions" class="suggestions"></div>
      </div>

      <div class="start-card" id="startCard">
        <div class="dest-copy">
          <div class="label">Destination</div>
          <div class="value" id="destName">—</div>
          <div class="sub" id="destSub">Awaiting route lock</div>
        </div>
        <div class="action-row">
          <button class="btn primary" id="startBtn" disabled>START NAV</button>
        </div>
      </div>
    </div>

    <div class="stop-wrap" id="stopWrap">
      <button class="btn danger" id="stopBtn">STOP NAVIGATION</button>
    </div>

    <div id="destPointer" class="dest-pointer">
      <div class="dest-triangle" id="destTriangle"></div>
      <div class="dest-label">TARGET</div>
    </div>

    <div class="sensor-prompt" id="sensorPrompt">
      <div class="title">SENSOR ACCESS REQUIRED</div>
      <div class="copy">Allow location and compass input for live nav.</div>
      <button class="btn primary" id="enableSensorsBtn">ENABLE GPS / COMPASS</button>
    </div>

    <div class="app-note" id="appNote">SEARCH MODE</div>

    <div class="hud">
      <div class="stat">
        <span>Speed</span>
        <strong id="speedVal">0 km/h</strong>
      </div>
      <div class="stat">
        <span>Distance</span>
        <strong id="distVal">--</strong>
      </div>
      <div class="stat">
        <span>ETA</span>
        <strong id="etaVal">--</strong>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const MAPBOX_TOKEN = 'YOUR_MAPBOX_ACCESS_TOKEN';

    mapboxgl.accessToken = MAPBOX_TOKEN;

    const state = {
      map: null,
      ready: false,
      sensorGranted: false,
      orientationGranted: false,
      geolocationGranted: false,
      watchId: null,
      currentPos: null,
      lastPos: null,
      lastPosTime: 0,
      heading: null,
      headingSource: 'none',
      destination: null,
      route: null,
      routeCoords: [],
      routeDistance: 0,
      routeDuration: 0,
      routeProgress: 0,
      lastRouteFetchAt: 0,
      navigationActive: false,
      fetchTimer: null,
      suggestionsAbort: null,
      updateRaf: 0,
      followUser: true,
      searchMode: true,
      speedKmh: 0
    };

    const els = {
      splash: document.getElementById('splash'),
      app: document.getElementById('app'),
      map: document.getElementById('map'),
      searchWrap: document.getElementById('searchWrap'),
      searchInput: document.getElementById('searchInput'),
      suggestions: document.getElementById('suggestions'),
      startCard: document.getElementById('startCard'),
      startBtn: document.getElementById('startBtn'),
      stopWrap: document.getElementById('stopWrap'),
      stopBtn: document.getElementById('stopBtn'),
      destName: document.getElementById('destName'),
      destSub: document.getElementById('destSub'),
      destPointer: document.getElementById('destPointer'),
      destTriangle: document.getElementById('destTriangle'),
      sensorPrompt: document.getElementById('sensorPrompt'),
      enableSensorsBtn: document.getElementById('enableSensorsBtn'),
      appNote: document.getElementById('appNote'),
      toast: document.getElementById('toast'),
      speedVal: document.getElementById('speedVal'),
      distVal: document.getElementById('distVal'),
      etaVal: document.getElementById('etaVal'),
      topShell: document.getElementById('topShell')
    };

    const ROUTE_SOURCE_ID = 'route-source';
    const ROUTE_LAYER_ID = 'route-layer';
    const VEHICLE_SOURCE_ID = 'vehicle-source';
    const VEHICLE_LAYER_ID = 'vehicle-layer';

    function showToast(message, ms = 2400) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => els.toast.classList.remove('show'), ms);
    }

    function normalizeAngle(deg) {
      let d = deg % 360;
      if (d < -180) d += 360;
      if (d > 180) d -= 360;
      return d;
    }

    function bearing(from, to) {
      const lat1 = from.lat * Math.PI / 180;
      const lat2 = to.lat * Math.PI / 180;
      const dLon = (to.lng - from.lng) * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2);
      const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function haversine(a, b) {
      const R = 6371000;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLon = (b.lng - a.lng) * Math.PI / 180;
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const s1 = Math.sin(dLat / 2);
      const s2 = Math.sin(dLon / 2);
      const h = s1 * s1 + Math.cos(lat1) * Math.cos(lat2) * s2 * s2;
      return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
    }

    function formatDistance(meters) {
      if (!isFinite(meters) || meters < 0) return '--';
      if (meters >= 1000) return `${(meters / 1000).toFixed(meters >= 10000 ? 0 : 1)} km`;
      return `${Math.max(1, Math.round(meters))} m`;
    }

    function formatETA(seconds) {
      if (!isFinite(seconds) || seconds < 0) return '--';
      const totalMinutes = Math.max(0, Math.round(seconds / 60));
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      if (hours > 0) return `${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m`;
      return `${minutes}m`;
    }

    function setHUDFromState() {
      els.speedVal.textContent = `${Math.max(0, Math.round(state.speedKmh))} km/h`;
      if (state.navigationActive && state.route && state.routeCoords.length > 1) {
        const remaining = Math.max(0, state.routeDistance - state.routeProgress);
        els.distVal.textContent = formatDistance(remaining);
        const etaSeconds = state.routeDistance > 1 ? state.routeDuration * (remaining / state.routeDistance) : 0;
        els.etaVal.textContent = formatETA(etaSeconds);
      } else if (state.destination && state.currentPos) {
        const direct = haversine(state.currentPos, state.destination);
        els.distVal.textContent = formatDistance(direct);
        els.etaVal.textContent = '--';
      } else {
        els.distVal.textContent = '--';
        els.etaVal.textContent = '--';
      }
    }

    const OLC_ALPHABET = '23456789CFGHJMPQRVWX';
    const OLC_SEPARATOR = '+';
    const OLC_REGEX = /(?:^|[^A-Z0-9])([23456789CFGHJMPQRVWX]{2,8}\+[23456789CFGHJMPQRVWX]{2,})(?:$|[^A-Z0-9])/i;

    function decodePlusCode(input) {
      if (!input) return null;
      const raw = input.toUpperCase().trim().replace(/\s+/g, '');
      if (!raw.includes(OLC_SEPARATOR)) return null;
      const code = raw.replace(/0/g, '');
      const match = code.match(/^([23456789CFGHJMPQRVWX]+)\+([23456789CFGHJMPQRVWX]+)$/i);
      if (!match) return null;
      const compact = (match[1] + match[2]).slice(0, 10);
      if (compact.length < 2 || compact.length % 2 !== 0) return null;

      let lat = -90;
      let lng = -180;
      let placeValue = 20;

      for (let i = 0; i < compact.length; i += 2) {
        const latIndex = OLC_ALPHABET.indexOf(compact[i]);
        const lngIndex = OLC_ALPHABET.indexOf(compact[i + 1]);
        if (latIndex < 0 || lngIndex < 0) return null;
        lat += latIndex * placeValue;
        lng += lngIndex * placeValue;
        placeValue /= 20;
      }

      lat += placeValue / 2;
      lng += placeValue / 2;

      return {
        lat,
        lng,
        label: input.trim().toUpperCase(),
        type: 'pluscode'
      };
    }

    function isPlusCodeCandidate(text) {
      return /[23456789CFGHJMPQRVWX]{4,8}\+[23456789CFGHJMPQRVWX]{2,}/i.test(text.replace(/\s+/g, ''));
    }

    function parseLatLng(text) {
      const t = text.trim();
      const m = t.match(/^(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)$/);
      if (!m) return null;
      const lat = Number(m[1]);
      const lng = Number(m[2]);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      if (Math.abs(lat) > 90 || Math.abs(lng) > 180) return null;
      return { lat, lng, label: t, type: 'coordinates' };
    }

    function debounce(fn, wait) {
      let t = null;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), wait);
      };
    }

    function setSearchMode(on) {
      state.searchMode = on;
      document.body.classList.toggle('search-hidden', !on);
      els.appNote.textContent = on ? 'SEARCH MODE' : 'NAV MODE';
      els.appNote.classList.add('show');
    }

    function updateSensorPrompt() {
      const needs = !state.geolocationGranted || !state.orientationGranted;
      els.sensorPrompt.classList.toggle('show', needs);
    }

    function clearSuggestions() {
      els.suggestions.innerHTML = '';
      els.suggestions.classList.remove('show');
    }

    function renderSuggestions(items) {
      if (!items.length) {
        clearSuggestions();
        return;
      }
      els.suggestions.innerHTML = items.map((item, idx) => {
        const name = item.place_name || item.label || 'UNKNOWN';
        const meta = item.place_type ? item.place_type.join(' • ').toUpperCase() : (item.type || '');
        return `
          <div class="suggestion" data-idx="${idx}">
            <div class="name">${escapeHtml(name)}</div>
            <div class="meta">${escapeHtml(meta)}</div>
          </div>`;
      }).join('');
      els.suggestions.classList.add('show');
      els.suggestions.querySelectorAll('.suggestion').forEach(node => {
        node.addEventListener('click', () => {
          const item = items[Number(node.dataset.idx)];
          selectDestination(item);
        });
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function geocodeQuery(query) {
      if (!MAPBOX_TOKEN || MAPBOX_TOKEN.includes('YOUR_MAPBOX_ACCESS_TOKEN')) {
        showToast('Add a real Mapbox token first.');
        return;
      }
      const controller = new AbortController();
      if (state.suggestionsAbort) state.suggestionsAbort.abort();
      state.suggestionsAbort = controller;

      try {
        const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?autocomplete=true&limit=5&language=en&country=tr&types=address,place,locality,poi&access_token=${encodeURIComponent(MAPBOX_TOKEN)}`;
        const res = await fetch(url, { signal: controller.signal });
        if (!res.ok) throw new Error('Geocoding failed');
        const data = await res.json();
        const features = Array.isArray(data.features) ? data.features : [];
        renderSuggestions(features.map(f => ({
          place_name: f.place_name,
          center: f.center,
          bbox: f.bbox,
          type: 'address',
          source: f
        })));
      } catch (err) {
        if (err.name !== 'AbortError') {
          clearSuggestions();
        }
      }
    }

    const debouncedSearch = debounce(async () => {
      const query = els.searchInput.value.trim();
      if (!query) {
        clearSuggestions();
        return;
      }

      const plus = decodePlusCode(query);
      const latlng = parseLatLng(query);
      if (plus || latlng) {
        renderSuggestions([plus || latlng]);
        return;
      }
      if (isPlusCodeCandidate(query)) {
        const decoded = decodePlusCode(query);
        if (decoded) {
          renderSuggestions([decoded]);
          return;
        }
      }
      await geocodeQuery(query);
    }, 280);

    function createMarkerElement(kind) {
      const wrap = document.createElement('div');
      wrap.className = 'marker-wrap';
      const el = document.createElement('div');
      el.className = kind === 'vehicle' ? 'marker-vehicle' : 'marker-dest';
      wrap.appendChild(el);
      wrap._shape = el;
      return wrap;
    }

    function ensureMapSources() {
      if (!state.map.getSource(ROUTE_SOURCE_ID)) {
        state.map.addSource(ROUTE_SOURCE_ID, {
          type: 'geojson',
          data: {
            type: 'Feature',
            properties: {},
            geometry: { type: 'LineString', coordinates: [] }
          }
        });
      }
      if (!state.map.getSource(VEHICLE_SOURCE_ID)) {
        state.map.addSource(VEHICLE_SOURCE_ID, {
          type: 'geojson',
          data: {
            type: 'Feature',
            properties: {},
            geometry: { type: 'Point', coordinates: [0, 0] }
          }
        });
      }
      if (!state.map.getLayer(ROUTE_LAYER_ID)) {
        state.map.addLayer({
          id: ROUTE_LAYER_ID,
          type: 'line',
          source: ROUTE_SOURCE_ID,
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: {
            'line-color': '#ffffff',
            'line-width': ['interpolate', ['linear'], ['zoom'], 12, 3, 16, 6, 19, 8],
            'line-opacity': 0.95,
            'line-blur': 0.2
          }
        });
      }
    }

    function updateRouteLayer(coords) {
      const src = state.map.getSource(ROUTE_SOURCE_ID);
      if (!src) return;
      src.setData({
        type: 'Feature',
        properties: {},
        geometry: {
          type: 'LineString',
          coordinates: coords.map(p => [p.lng, p.lat])
        }
      });
    }

    function updateVehicleSource(pos) {
      const src = state.map.getSource(VEHICLE_SOURCE_ID);
      if (!src) return;
      src.setData({
        type: 'Feature',
        properties: {},
        geometry: { type: 'Point', coordinates: [pos.lng, pos.lat] }
      });
    }

    function styleMapToNFSU() {
      const layers = state.map.getStyle().layers || [];
      for (const layer of layers) {
        try {
          if (layer.type === 'background') {
            state.map.setPaintProperty(layer.id, 'background-color', '#000000');
          } else if (layer.type === 'symbol') {
            state.map.setLayoutProperty(layer.id, 'visibility', 'none');
          } else if (layer.type === 'fill') {
            if (state.map.getPaintProperty(layer.id, 'fill-color') !== undefined) {
              state.map.setPaintProperty(layer.id, 'fill-color', '#000000');
              state.map.setPaintProperty(layer.id, 'fill-opacity', 1);
            }
          } else if (layer.type === 'line') {
            const id = layer.id.toLowerCase();
            if (id.includes('road') || id.includes('path') || id.includes('street') || id.includes('bridge') || id.includes('tunnel')) {
              state.map.setPaintProperty(layer.id, 'line-color', '#ffffff');
              state.map.setPaintProperty(layer.id, 'line-opacity', 0.9);
            } else if (id.includes('water')) {
              state.map.setPaintProperty(layer.id, 'line-color', '#000000');
            }
          }
        } catch (_) {}
      }
    }

    function fitMapToCurrent() {
      if (!state.currentPos) return;
      state.map.easeTo({
        center: [state.currentPos.lng, state.currentPos.lat],
        duration: 300,
        zoom: Math.max(state.map.getZoom(), 15.8)
      });
    }

    function setVehicleRotation(deg) {
      const wrap = state.vehicleMarker?.getElement();
      const el = wrap?._shape;
      if (el) {
        el.style.transform = `rotate(${deg}deg)`;
      }
    }

    function setDestRotation(deg) {
      els.destTriangle.style.transform = `translateX(-50%) rotate(${deg}deg)`;
    }

    function updateCompassAndMarkers() {
      if (!state.currentPos) return;
      updateVehicleSource(state.currentPos);
      if (state.vehicleMarker) {
        state.vehicleMarker.setLngLat([state.currentPos.lng, state.currentPos.lat]);
      }

      const heading = Number.isFinite(state.heading) ? state.heading : state.currentPos.heading;
      const vehicleDeg = Number.isFinite(heading) ? heading : 0;
      setVehicleRotation(vehicleDeg);

      if (state.destination) {
        els.destPointer.classList.add('show');
        const absBearing = bearing(state.currentPos, state.destination);
        const relative = Number.isFinite(heading) ? normalizeAngle(absBearing - heading) : absBearing;
        setDestRotation(relative);
      } else {
        els.destPointer.classList.remove('show');
      }
    }

    function routeProgressAlongLine(point, line) {
      if (!line || line.length < 2 || !point) return { traveled: 0, minDistance: Infinity };

      let bestDistance = Infinity;
      let bestTraveled = 0;
      let accumulated = 0;

      const toXY = (p, refLat) => {
        const latRad = refLat * Math.PI / 180;
        const x = p.lng * 111320 * Math.cos(latRad);
        const y = p.lat * 110540;
        return { x, y };
      };

      for (let i = 0; i < line.length - 1; i++) {
        const a = line[i];
        const b = line[i + 1];
        const refLat = (a.lat + b.lat) / 2;
        const ax = toXY(a, refLat);
        const bx = toXY(b, refLat);
        const px = toXY(point, refLat);

        const dx = bx.x - ax.x;
        const dy = bx.y - ax.y;
        const len2 = dx * dx + dy * dy;
        let t = 0;
        if (len2 > 0) {
          t = ((px.x - ax.x) * dx + (px.y - ax.y) * dy) / len2;
          t = Math.max(0, Math.min(1, t));
        }

        const proj = {
          x: ax.x + t * dx,
          y: ax.y + t * dy
        };
        const d = Math.hypot(px.x - proj.x, px.y - proj.y);
        const segLen = Math.hypot(dx, dy);

        if (d < bestDistance) {
          bestDistance = d;
          bestTraveled = accumulated + segLen * t;
        }

        accumulated += segLen;
      }

      return { traveled: bestTraveled, minDistance: bestDistance };
    }

    function maybeRerouteIfNeeded() {
      if (!state.navigationActive || !state.destination || !state.currentPos) return;
      const now = Date.now();
      if (now - state.lastRouteFetchAt < 15000) return;
      if (!state.routeCoords.length) return;
      const { minDistance } = routeProgressAlongLine(state.currentPos, state.routeCoords);
      if (minDistance > 70) {
        requestRoute();
      }
    }

    async function requestRoute() {
      if (!state.currentPos || !state.destination) return;
      if (!MAPBOX_TOKEN || MAPBOX_TOKEN.includes('YOUR_MAPBOX_ACCESS_TOKEN')) {
        showToast('Add a real Mapbox token first.');
        return;
      }
      try {
        showToast('LOCKING ROUTE...');
        const origin = `${state.currentPos.lng},${state.currentPos.lat}`;
        const dest = `${state.destination.lng},${state.destination.lat}`;
        const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${origin};${dest}?geometries=geojson&overview=full&steps=false&alternatives=false&annotations=distance,duration&voice_instructions=false&access_token=${encodeURIComponent(MAPBOX_TOKEN)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Directions request failed');
        const data = await res.json();
        if (!data.routes || !data.routes.length) throw new Error('No route found');
        const route = data.routes[0];
        const coords = route.geometry.coordinates.map(c => ({ lng: c[0], lat: c[1] }));

        state.route = route;
        state.routeCoords = coords;
        state.routeDistance = route.distance || 0;
        state.routeDuration = route.duration || 0;
        state.routeProgress = 0;
        state.lastRouteFetchAt = Date.now();

        ensureMapSources();
        updateRouteLayer(coords);
        updateCompassAndMarkers();

        els.destName.textContent = state.destination.label || state.destination.name || 'DESTINATION LOCKED';
        els.destSub.textContent = `${formatDistance(route.distance)} • ${formatETA(route.duration)}`;
        els.startBtn.disabled = false;
        els.startBtn.textContent = 'START NAV';
        els.startCard.classList.add('show');
        showToast('ROUTE READY');
      } catch (err) {
        console.error(err);
        showToast('ROUTE FAILED');
      }
    }

    function setDestination(dest) {
      state.destination = {
        lat: dest.lat,
        lng: dest.lng,
        label: dest.label || dest.place_name || 'Destination',
        name: dest.label || dest.place_name || 'Destination',
        type: dest.type || 'location',
        raw: dest
      };
      els.suggestions.classList.remove('show');
      els.searchInput.value = state.destination.label;
      els.destName.textContent = state.destination.label;
      els.destSub.textContent = 'ROUTE REQUESTED';
      els.startCard.classList.add('show');
      els.startBtn.disabled = true;
      els.startBtn.textContent = 'CALCULATING...';
      els.destPointer.classList.add('show');
      if (state.currentPos) {
        requestRoute();
      } else {
        showToast('WAITING FOR GPS FIX');
      }
    }

    function startNavigation() {
      if (!state.route || !state.destination || !state.currentPos) {
        showToast('ROUTE NOT READY');
        return;
      }
      state.navigationActive = true;
      state.followUser = true;
      state.routeProgress = 0;
      document.body.classList.add('search-hidden');
      els.stopWrap.classList.add('show');
      els.startCard.classList.remove('show');
      clearSuggestions();
      setSearchMode(false);
      showToast('NAVIGATION ACTIVE');
      fitMapToCurrent();
    }

    function stopNavigation() {
      state.navigationActive = false;
      state.route = null;
      state.routeCoords = [];
      state.routeDistance = 0;
      state.routeDuration = 0;
      state.routeProgress = 0;
      state.lastRouteFetchAt = 0;
      document.body.classList.remove('search-hidden');
      els.stopWrap.classList.remove('show');
      clearRouteLayer();
      setSearchMode(true);
      els.startCard.classList.toggle('show', !!state.destination);
      if (state.destination) {
        els.startBtn.disabled = false;
        els.startBtn.textContent = 'START NAV';
      }
      showToast('NAVIGATION STOPPED');
      setHUDFromState();
    }

    function clearRouteLayer() {
      const src = state.map?.getSource(ROUTE_SOURCE_ID);
      if (src) {
        src.setData({
          type: 'Feature',
          properties: {},
          geometry: { type: 'LineString', coordinates: [] }
        });
      }
    }

    function updateFromPosition(position) {
      const coords = position.coords;
      const pos = {
        lat: coords.latitude,
        lng: coords.longitude,
        accuracy: coords.accuracy,
        heading: Number.isFinite(coords.heading) ? coords.heading : null,
        speed: Number.isFinite(coords.speed) ? coords.speed : null
      };

      const now = Date.now();
      if (state.lastPos && state.lastPosTime) {
        const elapsed = Math.max((now - state.lastPosTime) / 1000, 0.001);
        const moved = haversine(state.lastPos, pos);
        const derivedSpeed = moved / elapsed;
        if (!Number.isFinite(pos.speed) || pos.speed === null) {
          pos.speed = derivedSpeed;
        }
        if (!state.speedKmh || state.speedKmh < 1) {
          state.speedKmh = derivedSpeed * 3.6;
        }
      } else {
        state.speedKmh = Number.isFinite(pos.speed) && pos.speed !== null ? pos.speed * 3.6 : 0;
      }

      state.lastPos = state.currentPos;
      state.currentPos = pos;
      state.lastPosTime = now;
      if (Number.isFinite(pos.speed) && pos.speed !== null) {
        state.speedKmh = pos.speed * 3.6;
      }

      if (!Number.isFinite(state.heading) || state.headingSource === 'geo' || (pos.speed !== null && pos.speed > 1.2 && Number.isFinite(pos.heading))) {
        if (Number.isFinite(pos.heading)) {
          state.heading = pos.heading;
          state.headingSource = 'geo';
        }
      }

      if (!state.map) return;

      ensureMapSources();

      if (!state.vehicleMarker) {
        state.vehicleMarker = new mapboxgl.Marker({
          element: createMarkerElement('vehicle'),
          anchor: 'center'
        }).setLngLat([pos.lng, pos.lat]).addTo(state.map);
      } else {
        state.vehicleMarker.setLngLat([pos.lng, pos.lat]);
      }

      if (!state.currentCenteredOnce) {
        state.currentCenteredOnce = true;
        state.map.setCenter([pos.lng, pos.lat]);
        state.map.setZoom(16);
      } else if (state.navigationActive || state.followUser) {
        state.map.easeTo({
          center: [pos.lng, pos.lat],
          duration: 250
        });
      }

      updateCompassAndMarkers();
      setHUDFromState();

      if (state.routeCoords.length > 1 && state.navigationActive) {
        const p = routeProgressAlongLine(pos, state.routeCoords);
        state.routeProgress = Math.max(state.routeProgress, p.traveled);
        if (p.minDistance > 70) maybeRerouteIfNeeded();
        setHUDFromState();
      } else if (state.destination && !state.navigationActive) {
        setHUDFromState();
      }
    }

    async function requestSensors() {
      startGeolocationWatch();

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission === 'granted') {
            state.orientationGranted = true;
            window.addEventListener('deviceorientation', (event) => {
              if (typeof event.webkitCompassHeading === 'number') {
                state.heading = event.webkitCompassHeading;
                state.headingSource = 'compass';
              } else if (event.alpha !== null && event.alpha !== undefined) {
                const screenAngle = (screen.orientation && typeof screen.orientation.angle === 'number')
                  ? screen.orientation.angle
                  : (window.orientation || 0);
                state.heading = (360 - event.alpha + screenAngle) % 360;
                state.headingSource = 'compass';
              }
              if (state.currentPos) updateCompassAndMarkers();
            }, true);
            showToast('COMPASS ENABLED');
          } else {
            showToast('COMPASS PERMISSION DENIED');
          }
        } catch (err) {
          showToast('COMPASS REQUEST FAILED');
        }
      } else {
        state.orientationGranted = true;
        const orientationHandler = (event) => {
          let heading = null;
          if (typeof event.webkitCompassHeading === 'number') {
            heading = event.webkitCompassHeading;
          } else if (event.alpha !== null && event.alpha !== undefined) {
            const screenAngle = (screen.orientation && typeof screen.orientation.angle === 'number')
              ? screen.orientation.angle
              : (window.orientation || 0);
            heading = (360 - event.alpha + screenAngle) % 360;
          }
          if (Number.isFinite(heading)) {
            state.heading = heading;
            state.headingSource = 'compass';
            if (state.currentPos) updateCompassAndMarkers();
          }
        };
        window.addEventListener('deviceorientationabsolute', orientationHandler, true);
        window.addEventListener('deviceorientation', orientationHandler, true);
      }
      updateSensorPrompt();
    }

    function startGeolocationWatch() {
      if (!navigator.geolocation) {
        showToast('GEOLOCATION UNAVAILABLE');
        return;
      }
      if (state.watchId !== null) {
        navigator.geolocation.clearWatch(state.watchId);
      }
      state.watchId = navigator.geolocation.watchPosition(
        (position) => {
          state.geolocationGranted = true;
          updateSensorPrompt();
          updateFromPosition(position);
          if (state.destination && !state.route && !state.navigationActive) {
            requestRoute();
          }
        },
        (err) => {
          console.error(err);
          state.geolocationGranted = false;
          updateSensorPrompt();
          const messages = {
            1: 'LOCATION PERMISSION DENIED',
            2: 'LOCATION UNAVAILABLE',
            3: 'LOCATION TIMEOUT'
          };
          showToast(messages[err.code] || 'LOCATION ERROR');
        },
        {
          enableHighAccuracy: true,
          maximumAge: 1000,
          timeout: 12000
        }
      );
    }

    function selectDestination(item) {
      clearSuggestions();

      if (item && item.lat !== undefined && item.lng !== undefined && !item.center) {
        const dest = {
          lat: item.lat,
          lng: item.lng,
          label: item.label || item.place_name || 'Destination',
          type: item.type || 'location'
        };
        setDestination(dest);
        if (state.currentPos) requestRoute();
        return;
      }

      if (item && item.center) {
        const [lng, lat] = item.center;
        setDestination({
          lat,
          lng,
          label: item.place_name || 'Destination',
          type: item.type || 'address'
        });
        if (state.currentPos) requestRoute();
        return;
      }

      const text = els.searchInput.value.trim();
      const plus = decodePlusCode(text);
      if (plus) {
        setDestination(plus);
        if (state.currentPos) requestRoute();
        return;
      }

      const coord = parseLatLng(text);
      if (coord) {
        setDestination(coord);
        if (state.currentPos) requestRoute();
        return;
      }

      showToast('SELECT A RESULT');
    }

    function initMap() {
      state.map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [29.0, 41.0],
        zoom: 12,
        attributionControl: false,
        interactive: true,
        pitchWithRotate: false,
        dragRotate: false,
        touchZoomRotate: false
      });

      state.map.on('load', () => {
        styleMapToNFSU();
        ensureMapSources();
        state.ready = true;
      });
    }

    function bootSplash() {
      setTimeout(() => {
        els.splash.classList.add('hide');
        els.app.classList.add('ready');
      }, 3050);
    }

    function wireUI() {
      els.searchInput.addEventListener('input', debouncedSearch);
      els.searchInput.addEventListener('focus', () => {
        if (els.searchInput.value.trim()) debouncedSearch();
      });
      els.searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const text = els.searchInput.value.trim();
          if (!text) return;
          const plus = decodePlusCode(text) || parseLatLng(text);
          if (plus) {
            selectDestination(plus);
          } else if (els.suggestions.children.length) {
            const first = els.suggestions.querySelector('.suggestion');
            if (first) first.click();
          } else {
            debouncedSearch();
          }
        } else if (e.key === 'Escape') {
          clearSuggestions();
        }
      });

      document.addEventListener('click', (e) => {
        if (!els.searchWrap.contains(e.target)) {
          clearSuggestions();
        }
      });

      els.startBtn.addEventListener('click', () => startNavigation());
      els.stopBtn.addEventListener('click', () => stopNavigation());
      els.enableSensorsBtn.addEventListener('click', () => requestSensors());

      window.addEventListener('resize', () => {
        if (state.map) state.map.resize();
      });

      window.addEventListener('orientationchange', () => {
        if (state.map) setTimeout(() => state.map.resize(), 150);
      });
    }

    function init() {
      wireUI();
      initMap();
      bootSplash();
      updateSensorPrompt();
      setSearchMode(true);
      setHUDFromState();

      if (!MAPBOX_TOKEN || MAPBOX_TOKEN.includes('pk.eyJ1IjoiemFtcGFycmE3NiIsImEiOiJjbXFydTcxd3IwMWRjMnNzOTU1b2ZseXJ4In0.WtUhqD_3eCe2csSDe16asA')) {
        showToast('PASTE YOUR MAPBOX TOKEN');
      }

      if (navigator.geolocation) {
        const tryAuto = () => {
          startGeolocationWatch();
        };
        if (document.visibilityState === 'visible') {
          tryAuto();
        } else {
          document.addEventListener('visibilitychange', function once() {
            if (document.visibilityState === 'visible') {
              document.removeEventListener('visibilitychange', once);
              tryAuto();
            }
          });
        }
      } else {
        updateSensorPrompt();
      }

      if ('DeviceOrientationEvent' in window && typeof DeviceOrientationEvent.requestPermission !== 'function') {
        state.orientationGranted = true;
        updateSensorPrompt();
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
