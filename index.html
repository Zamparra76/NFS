<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NFSU2 NAV</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>

<style>
  /* ============================================================
     FONTS & RESET
  ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-blue:   #00d4ff;
    --neon-green:  #39ff14;
    --neon-pink:   #ff2d78;
    --dark-bg:     #000000;
    --panel-bg:    rgba(0, 0, 0, 0.82);
    --panel-border: rgba(0, 212, 255, 0.35);
    --text-main:   #e0f7ff;
    --text-dim:    #5a7a8a;
    --glow-blue:   0 0 8px #00d4ff, 0 0 20px rgba(0,212,255,0.4);
    --glow-green:  0 0 8px #39ff14, 0 0 20px rgba(57,255,20,0.4);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-main);
  }

  /* ============================================================
     MAP
  ============================================================ */
  #map {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
  }

  /* ============================================================
     SCANLINE OVERLAY (aesthetic)
  ============================================================ */
  #scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
  }

  /* ============================================================
     CORNER DECORATIONS
  ============================================================ */
  .corner {
    position: fixed;
    width: 40px; height: 40px;
    pointer-events: none;
    z-index: 10;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--neon-blue);
    box-shadow: var(--glow-blue);
  }
  .corner::before { width: 100%; height: 2px; }
  .corner::after  { width: 2px; height: 100%; }
  .corner-tl { top: 8px; left: 8px; }
  .corner-tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .corner-bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .corner-br { bottom: 8px; right: 8px; transform: scale(-1); }

  /* ============================================================
     TOP HUD PANEL
  ============================================================ */
  #top-hud {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    width: min(640px, 96vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Search bar row */
  #search-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    padding: 8px 12px;
    backdrop-filter: blur(12px);
    box-shadow: var(--glow-blue), inset 0 0 20px rgba(0,212,255,0.04);
    transition: opacity 0.4s, transform 0.4s;
  }

  #search-row.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-20px);
  }

  #search-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--neon-blue);
    white-space: nowrap;
    text-shadow: var(--glow-blue);
  }

  #search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 1px;
    caret-color: var(--neon-green);
  }
  #search-input::placeholder { color: var(--text-dim); }

  .hud-btn {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--neon-blue);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 3px;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .hud-btn:hover {
    background: rgba(0,212,255,0.12);
    box-shadow: var(--glow-blue);
    color: #fff;
  }
  .hud-btn:active { transform: scale(0.95); }

  /* Autocomplete dropdown */
  #autocomplete {
    width: 100%;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    backdrop-filter: blur(12px);
    overflow: hidden;
    transition: opacity 0.3s;
  }
  #autocomplete.hidden { display: none; }

  .ac-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid rgba(0,212,255,0.1);
    font-size: 12px;
    letter-spacing: 0.5px;
    transition: background 0.15s;
    color: var(--text-main);
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: rgba(0,212,255,0.12); color: var(--neon-blue); }
  .ac-item .place-name { color: #fff; font-size: 13px; }
  .ac-item .place-addr { color: var(--text-dim); font-size: 10px; margin-top: 2px; }

  /* ============================================================
     DIRECTION ARROW (NFSU2 style)
  ============================================================ */
  #dir-arrow-wrap {
    position: fixed;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
    transition: opacity 0.4s;
    opacity: 0;
  }
  #dir-arrow-wrap.visible { opacity: 1; }

  #dir-arrow {
    width: 0; height: 0;
    border-left:  18px solid transparent;
    border-right: 18px solid transparent;
    border-bottom: 44px solid var(--neon-blue);
    filter: drop-shadow(0 0 8px var(--neon-blue)) drop-shadow(0 0 18px rgba(0,212,255,0.7));
    transition: transform 0.3s ease;
    transform-origin: center 65%;
  }

  #dir-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--neon-blue);
    text-shadow: var(--glow-blue);
    text-align: center;
  }

  /* ============================================================
     BOTTOM STATS PANEL
  ============================================================ */
  #stats-panel {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 20;
    background: var(--panel-bg);
    border-top: 1px solid var(--panel-border);
    backdrop-filter: blur(14px);
    padding: 14px 24px 20px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    gap: 16px;
    box-shadow: 0 -4px 30px rgba(0,212,255,0.15);
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #stats-panel.visible { transform: translateY(0); }

  .stat-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex: 1;
  }
  .stat-block + .stat-block {
    border-left: 1px solid var(--panel-border);
  }

  .stat-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 7px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1;
  }
  .stat-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  #stat-speed .stat-value { color: var(--neon-green); text-shadow: var(--glow-green); }
  #stat-dist  .stat-value { color: var(--neon-blue);  text-shadow: var(--glow-blue);  }
  #stat-eta   .stat-value { color: var(--neon-blue);  text-shadow: var(--glow-blue);  }

  /* ============================================================
     CANCEL BUTTON (during nav)
  ============================================================ */
  #cancel-btn {
    position: fixed;
    top: 18px; right: 18px;
    z-index: 25;
    display: none;
    background: var(--panel-bg);
    border: 1px solid rgba(255,45,120,0.5);
    color: var(--neon-pink);
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    box-shadow: 0 0 8px rgba(255,45,120,0.3);
  }
  #cancel-btn:hover { background: rgba(255,45,120,0.15); box-shadow: 0 0 16px rgba(255,45,120,0.6); }

  /* ============================================================
     TOAST NOTIFICATION
  ============================================================ */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 30;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    color: var(--neon-blue);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 8px 20px;
    border-radius: 3px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ============================================================
     LOADING OVERLAY
  ============================================================ */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.6s;
  }
  #loading.fade-out { opacity: 0; pointer-events: none; }

  #loading-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--neon-blue);
    text-shadow: var(--glow-blue), 0 0 60px rgba(0,212,255,0.5);
    animation: pulse 1.2s ease-in-out infinite alternate;
  }
  #loading-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
  }
  #loading-bar-wrap {
    width: 200px;
    height: 2px;
    background: rgba(0,212,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  #loading-bar {
    height: 100%;
    background: var(--neon-blue);
    box-shadow: var(--glow-blue);
    width: 0%;
    animation: loadbar 1.8s ease-out forwards;
  }

  @keyframes loadbar { 0% { width: 0%; } 100% { width: 100%; } }
  @keyframes pulse { from { text-shadow: var(--glow-blue); } to { text-shadow: 0 0 20px var(--neon-blue), 0 0 60px rgba(0,212,255,0.8); } }

  /* ============================================================
     ARRIVED OVERLAY
  ============================================================ */
  #arrived-overlay {
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #arrived-overlay.show { display: flex; }
  #arrived-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(32px, 7vw, 64px);
    font-weight: 900;
    color: var(--neon-green);
    letter-spacing: 6px;
    text-shadow: var(--glow-green), 0 0 80px rgba(57,255,20,0.4);
    animation: pulse-green 0.8s ease-in-out infinite alternate;
  }
  #arrived-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
  #arrived-ok {
    margin-top: 10px;
    background: transparent;
    border: 1px solid var(--neon-green);
    color: var(--neon-green);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 10px 30px;
    cursor: pointer;
    border-radius: 3px;
    box-shadow: var(--glow-green);
    transition: background 0.2s;
  }
  #arrived-ok:hover { background: rgba(57,255,20,0.12); }

  @keyframes pulse-green {
    from { text-shadow: var(--glow-green); }
    to   { text-shadow: 0 0 20px var(--neon-green), 0 0 80px rgba(57,255,20,0.7); }
  }

  /* ============================================================
     MAPBOX ATTRIBUTION – minimal
  ============================================================ */
  .mapboxgl-ctrl-attrib { opacity: 0.3 !important; }
  .mapboxgl-ctrl-logo   { opacity: 0.2 !important; }

  /* ============================================================
     RESPONSIVE TWEAKS
  ============================================================ */
  @media (max-width: 480px) {
    #search-label { display: none; }
    .stat-label { font-size: 6px; letter-spacing: 2px; }
    .stat-value { font-size: 20px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-title">NFSU2 NAV</div>
  <div id="loading-sub">INITIALIZING STREET SYSTEMS</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<div id="map"></div>
<div id="scanlines"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="top-hud">
  <div id="search-row">
    <span id="search-label">DEST</span>
    <input id="search-input" type="text" placeholder="Hedef gir..." autocomplete="off" spellcheck="false">
    <button class="hud-btn" id="locate-btn" title="Konuma git">◎ KON</button>
    <button class="hud-btn" id="copy-btn"   title="Koordinat kopyala">⊞ KOP</button>
  </div>
  <div id="autocomplete" class="hidden"></div>
</div>

<div id="dir-arrow-wrap">
  <div id="dir-arrow"></div>
  <div id="dir-label">HEDEF YÖNÜ</div>
</div>

<div id="stats-panel">
  <div class="stat-block" id="stat-speed">
    <div class="stat-label">HIZ</div>
    <div class="stat-value" id="val-speed">0</div>
    <div class="stat-unit">km/s</div>
  </div>
  <div class="stat-block" id="stat-dist">
    <div class="stat-label">KALAN</div>
    <div class="stat-value" id="val-dist">-</div>
    <div class="stat-unit">km</div>
  </div>
  <div class="stat-block" id="stat-eta">
    <div class="stat-label">VARIŞ</div>
    <div class="stat-value" id="val-eta">-</div>
    <div class="stat-unit">dk</div>
  </div>
</div>

<button id="cancel-btn">✕ İPTAL</button>

<div id="toast"></div>

<div id="arrived-overlay">
  <div id="arrived-title">HEDEFE ULAŞILDI</div>
  <div id="arrived-sub">DESTINASYON TAMAMLANDI</div>
  <button id="arrived-ok">YENİ ROTA</button>
</div>

<script>
// Doğrudan aktarılan orijinal Mapbox Access Token
const MAPBOX_TOKEN = "pk.eyJ1IjoiemFtcGFycmE3NiIsImEiOiJjbXFydTcxd3IwMWRjMnNzOTU1b2ZseXJ4In0.WtUhqD_3eCe2csSDe16asA";

// ─── STATE ───────────────────────────────────────────────────
let map, userMarker, destMarker;
let userLng = null, userLat = null;
let destLng = null, destLat = null;
let routeCoords  = [];
let animFrameId  = null;
let animIndex    = 0;
let isNavigating = false;
let acDebounce   = null;
let currentBearing = 0;

const SIM_SPEED_KMH = 80; 
const SIM_STEP_MS   = 16; 

// ─── DOM REFS ────────────────────────────────────────────────
const $searchRow   = document.getElementById('search-row');
const $searchInput = document.getElementById('search-input');
const $autocomplete= document.getElementById('autocomplete');
const $dirWrap     = document.getElementById('dir-arrow-wrap');
const $dirArrow    = document.getElementById('dir-arrow');
const $statsPanel  = document.getElementById('stats-panel');
const $cancelBtn   = document.getElementById('cancel-btn');
const $valSpeed    = document.getElementById('val-speed');
const $valDist     = document.getElementById('val-dist');
const $valEta      = document.getElementById('val-eta');
const $toast       = document.getElementById('toast');
const $loading     = document.getElementById('loading');
const $arrivedOvl  = document.getElementById('arrived-overlay');

// ─── UTIL: BEARING ───────────────────────────────────────────
function bearing(lng1, lat1, lng2, lat2) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const dLng  = toRad(lng2 - lng1);
  const la1   = toRad(lat1), la2 = toRad(lat2);
  const y = Math.sin(dLng) * Math.cos(la2);
  const x = Math.cos(la1) * Math.sin(la2) - Math.sin(la1) * Math.cos(la2) * Math.cos(dLng);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// ─── UTIL: HAVERSINE (km) ────────────────────────────────────
function haversine(lng1, lat1, lng2, lat2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ─── UTIL: LERP ──────────────────────────────────────────────
function lerpCoord(a, b, t) {
  return [a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t];
}

// ─── TOAST ───────────────────────────────────────────────────
function showToast(msg, ms=2200) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  setTimeout(() => $toast.classList.remove('show'), ms);
}

// ─── NEON GREEN TRIANGLE SVG (araca özel ikon) ───────────────
function makeVehicleEl() {
  const el = document.createElement('div');
  el.style.cssText = `width:36px;height:36px;display:flex;align-items:center;justify-content:center;transform-origin:center;pointer-events:none;`;
  el.innerHTML = `
    <svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <polygon points="18,4 32,30 4,30" fill="#39ff14" filter="url(#glow)" opacity="0.95"/>
      <polygon points="18,8 29,27 7,27"  fill="none" stroke="#39ff14" stroke-width="1" opacity="0.5"/>
    </svg>`;
  return el;
}

// ─── MAP INIT ────────────────────────────────────────────────
function initMap() {
  mapboxgl.accessToken = MAPBOX_TOKEN;

  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/navigation-night-v1', 
    center: [28.9784, 41.0082],
    zoom: 13,
    bearing: 0,
    pitch: 45,
    attributionControl: false
  });

  map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-right');

  map.on('load', () => {
    const vehicleEl = makeVehicleEl();
    userMarker = new mapboxgl.Marker({ element: vehicleEl, rotationAlignment: 'map' })
      .setLngLat([28.9784, 41.0082])
      .addTo(map);

    startGeolocation();

    map.on('click', e => {
      if (!isNavigating) setDestination(e.lngLat.lng, e.lngLat.lat, 'Harita Noktası');
    });

    setTimeout(() => {
      $loading.classList.add('fade-out');
      setTimeout(() => $loading.style.display='none', 700);
    }, 1900);
  });
}

// ─── GEOLOCATION ─────────────────────────────────────────────
function startGeolocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    userLng = pos.coords.longitude;
    userLat = pos.coords.latitude;
    if (userMarker) userMarker.setLngLat([userLng, userLat]);
    if (!isNavigating) {
      map.easeTo({ center: [userLng, userLat], duration: 600 });
    }
    updateDirectionArrow();
  }, () => {
    userLng = 28.9784; userLat = 41.0082;
  }, { enableHighAccuracy: true, maximumAge: 1000 });
}

// ─── DIRECTION ARROW UPDATE ───────────────────────────────────
function updateDirectionArrow() {
  if (!destLng || !userLng) return;
  const b = bearing(userLng, userLat, destLng, destLat);
  const mapB = map.getBearing();
  $dirArrow.style.transform = `rotate(${b - mapB}deg)`;
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────────
$searchInput.addEventListener('input', () => {
  clearTimeout(acDebounce);
  const q = $searchInput.value.trim();
  if (q.length < 2) { $autocomplete.classList.add('hidden'); return; }
  acDebounce = setTimeout(() => fetchSuggestions(q), 300);
});

async function fetchSuggestions(q) {
  const prox  = (userLng && userLat) ? `&proximity=${userLng},${userLat}` : '';
  const url   = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${MAPBOX_TOKEN}&language=tr&limit=5${prox}`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    renderSuggestions(d.features || []);
  } catch(e) { console.error(e); }
}

function renderSuggestions(items) {
  if (!items.length) { $autocomplete.classList.add('hidden'); return; }
  $autocomplete.innerHTML = items.map(f => `
    <div class="ac-item" data-lng="${f.center[0]}" data-lat="${f.center[1]}" data-name="${f.place_name.replace(/"/g,'&quot;')}">
      <div class="place-name">${f.text}</div>
      <div class="place-addr">${f.place_name}</div>
    </div>`).join('');
  $autocomplete.classList.remove('hidden');

  $autocomplete.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('click', () => {
      const lng  = parseFloat(el.dataset.lng);
      const lat  = parseFloat(el.dataset.lat);
      const name = el.dataset.name;
      $autocomplete.classList.add('hidden');
      $searchInput.value = '';
      setDestination(lng, lat, name);
    });
  });
}

document.addEventListener('click', e => {
  if (!$searchInput.contains(e.target) && !$autocomplete.contains(e.target))
    $autocomplete.classList.add('hidden');
});

// ─── LOCATE BUTTON ────────────────────────────────────────────
document.getElementById('locate-btn').addEventListener('click', () => {
  if (!userLng) { showToast('KONUM BEKLENİYOR...'); return; }
  map.flyTo({ center: [userLng, userLat], zoom: 15, pitch: 45, bearing: 0, duration: 1000 });
});

// ─── COPY BUTTON ─────────────────────────────────────────────
document.getElementById('copy-btn').addEventListener('click', () => {
  const ref = destLng
    ? `${destLat.toFixed(6)},${destLng.toFixed(6)}`
    : userLng
      ? `${userLat.toFixed(6)},${userLng.toFixed(6)}`
      : null;
  if (!ref) { showToast('KONUM YOK'); return; }
  navigator.clipboard.writeText(ref)
    .then(() => showToast(`KOPYALANDI: ${ref}`))
    .catch(() => showToast('KOPYALANAMADI'));
});

// ─── SET DESTINATION ─────────────────────────────────────────
function setDestination(lng, lat, name) {
  destLng = lng; destLat = lat;

  if (destMarker) destMarker.remove();
  const el = document.createElement('div');
  el.style.cssText = 'width:18px;height:18px;border:2px solid #00d4ff;border-radius:50%;background:rgba(0,212,255,0.25);box-shadow:0 0 12px #00d4ff;';
  destMarker = new mapboxgl.Marker({ element: el })
    .setLngLat([lng, lat])
    .addTo(map);

  $dirWrap.classList.add('visible');
  updateDirectionArrow();
  showToast(`ROTA HESAPLANIYOR: ${name.substring(0,30)}...`);
  fetchRoute();
}

// ─── FETCH ROUTE (Directions API) ────────────────────────────
async function fetchRoute() {
  if (!userLng || !destLng) return;
  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${userLng},${userLat};${destLng},${destLat}?geometries=geojson&steps=false&access_token=${MAPBOX_TOKEN}`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (!d.routes || !d.routes.length) { showToast('ROTA BULUNAMADI'); return; }
    const route = d.routes[0];
    routeCoords = route.geometry.coordinates;
    drawRoute(routeCoords);
    startNavigation();
  } catch(e) { console.error(e); showToast('BAĞLANTI HATASI'); }
}

// ─── DRAW ROUTE ───────────────────────────────────────────────
function drawRoute(coords) {
  ['route-glow','route-core'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource(id)) map.removeSource(id);
  });

  const geojson = { type:'Feature', geometry:{ type:'LineString', coordinates:coords }};

  map.addSource('route-glow', { type:'geojson', data: geojson });
  map.addLayer({
    id: 'route-glow',
    type: 'line',
    source: 'route-glow',
    paint: {
      'line-color': '#00d4ff',
      'line-width': 14,
      'line-blur': 8,
      'line-opacity': 0.45
    }
  });

  map.addSource('route-core', { type:'geojson', data: geojson });
  map.addLayer({
    id: 'route-core',
    type: 'line',
    source: 'route-core',
    paint: {
      'line-color': '#00d4ff',
      'line-width': 3,
      'line-opacity': 0.95
    }
  });
}

// ─── START NAVIGATION ────────────────────────────────────────
let lastTimestamp = null;
let fracIndex = 0; 

function animateVehicle(ts) {
  if (!isNavigating) return;

  if (lastTimestamp === null) lastTimestamp = ts;
  const dt = Math.min((ts - lastTimestamp) / 1000, 0.1); 
  lastTimestamp = ts;

  const speedMs    = SIM_SPEED_KMH / 3.6; 
  const totalCoords = routeCoords.length;

  if (fracIndex >= totalCoords - 1) {
    onArrived();
    return;
  }

  const ci  = Math.floor(fracIndex);
  const ci2 = Math.min(ci + 1, totalCoords - 1);
  const segDist = haversine(...routeCoords[ci], ...routeCoords[ci2]) * 1000; 

  if (segDist > 0) {
    const step = (speedMs * dt) / segDist;
    fracIndex = Math.min(fracIndex + step, totalCoords - 1);
  } else {
    fracIndex = Math.min(fracIndex + 0.01, totalCoords - 1);
  }

  const ci3  = Math.floor(fracIndex);
  const frac = fracIndex - ci3;
  const ci4  = Math.min(ci3 + 1, totalCoords - 1);
  const pos  = lerpCoord(routeCoords[ci3], routeCoords[ci4], frac);

  const nextI = Math.min(ci3 + 1, totalCoords - 1);
  const vBearing = bearing(...routeCoords[ci3], ...routeCoords[nextI]);

  userMarker.setLngLat(pos);
  userLng = pos[0]; userLat = pos[1];

  const markerEl = userMarker.getElement();
  markerEl.style.transform = `rotate(${vBearing}deg)`;

  map.easeTo({
    center: pos,
    bearing: vBearing,
    pitch: 55,
    zoom: 16,
    duration: SIM_STEP_MS,
    easing: t => t
  });

  let remaining = 0;
  for (let i = ci3; i < totalCoords - 1; i++) {
    const a = (i === ci3) ? pos : routeCoords[i];
    remaining += haversine(...a, ...routeCoords[i+1]);
  }
  const etaMin = (remaining / (SIM_SPEED_KMH / 60)).toFixed(0);

  $valSpeed.textContent = SIM_SPEED_KMH;
  $valDist.textContent  = remaining.toFixed(2);
  $valEta.textContent   = etaMin;

  if (destLng) {
    const b2 = bearing(pos[0], pos[1], destLng, destLat);
    const mb  = map.getBearing();
    $dirArrow.style.transform = `rotate(${b2 - mb}deg)`;
  }

  animFrameId = requestAnimationFrame(animateVehicle);
}

function startAnimLoop() {
  lastTimestamp = null;
  fracIndex = 0;
  animFrameId = requestAnimationFrame(animateVehicle);
}

function startNavigation() {
  isNavigating = true;

  $searchRow.classList.add('hidden');
  $statsPanel.classList.add('visible');
  $cancelBtn.style.display = 'block';

  const start = routeCoords[0];
  userMarker.setLngLat(start);
  userLng = start[0]; userLat = start[1];

  startAnimLoop();
}

// ─── ARRIVED ─────────────────────────────────────────────────
function onArrived() {
  cancelAnimation();
  $arrivedOvl.classList.add('show');
}

document.getElementById('arrived-ok').addEventListener('click', resetNav);

// ─── CANCEL ──────────────────────────────────────────────────
$cancelBtn.addEventListener('click', resetNav);

function cancelAnimation() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId = null;
  isNavigating = false;
}

function resetNav() {
  cancelAnimation();

  $arrivedOvl.classList.remove('show');
  $statsPanel.classList.remove('visible');
  $cancelBtn.style.display = 'none';
  $searchRow.classList.remove('hidden');
  $dirWrap.classList.remove('visible');

  ['route-glow','route-core'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource(id)) map.removeSource(id);
  });

  if (destMarker) { destMarker.remove(); destMarker = null; }
  destLng = null; destLat = null;
  routeCoords = [];

  $valSpeed.textContent = '0';
  $valDist.textContent  = '-';
  $valEta.textContent   = '-';

  map.easeTo({ pitch: 45, bearing: 0, zoom: 14, duration: 800 });

  startGeolocation();

  showToast('ROTA İPTAL EDİLDİ');
}

// ─── BOOT ────────────────────────────────────────────────────
initMap();
</script>
