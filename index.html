<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFSU2 Style Navigation</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            bottom: 0;
        }

        /* UI Katmanları */
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        /* Üst Panel - Arama */
        .search-wrapper {
            width: 100%;
            max-width: 500px;
            pointer-events: auto;
            transition: all 0.5s ease;
        }

        .search-container {
            background: rgba(10, 15, 15, 0.85);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            border-radius: 4px;
            display: flex;
            align-items: center;
            padding: 5px 10px;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ffcc;
            font-size: 16px;
            padding: 10px;
            outline: none;
            font-weight: bold;
            text-transform: uppercase;
        }

        .search-input::placeholder {
            color: rgba(0, 255, 204, 0.5);
        }

        .copy-btn {
            background: transparent;
            border: 1px solid #00ccff;
            color: #00ccff;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 0 0 8px rgba(0, 204, 255, 0.3);
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #00ccff;
            color: #000;
            box-shadow: 0 0 15px #00ccff;
        }

        /* Arama Sonuçları */
        .results-list {
            background: rgba(5, 10, 10, 0.9);
            border-left: 2px solid #00ffcc;
            border-right: 2px solid #00ffcc;
            border-bottom: 2px solid #00ffcc;
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
            margin-top: 2px;
            display: none;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }

        .results-list li {
            color: #fff;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 255, 204, 0.1);
            font-size: 13px;
            text-transform: uppercase;
        }

        .results-list li:hover {
            background: rgba(0, 255, 204, 0.2);
            color: #00ffcc;
        }

        /* NFSU2 Havada Asılı Yön Oku */
        .hud-arrow-container {
            position: absolute;
            top: 100px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .hud-arrow {
            width: 70px;
            height: 70px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2300ccff"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 12px #00ccff) drop-shadow(0 0 25px #00ccff);
            transition: transform 0.1s linear;
        }

        /* Alt Bilgi Paneli */
        .hud-bottom-panel {
            width: 100%;
            max-width: 600px;
            background: rgba(10, 10, 15, 0.9);
            border: 3px solid #00ccff;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 -5px 25px rgba(0, 204, 255, 0.3);
            padding: 15px 25px;
            display: none;
            pointer-events: auto;
            justify-content: space-between;
            align-items: center;
        }

        .hud-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .hud-value {
            color: #00ffcc;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.7);
        }

        .hud-unit {
            font-size: 12px;
            color: #00ccff;
            margin-left: 3px;
        }

        /* Araç İkonu (Neon Yeşil Üçgen) */
        .car-marker {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 28px solid #00ffcc;
            filter: drop-shadow(0 0 8px #00ffcc) drop-shadow(0 0 15px #00ffcc);
            cursor: pointer;
        }

        /* Gizleme Sınıfı */
        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: translateY(-50px);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-container">
        <div class="search-wrapper" id="searchWrapper">
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="DESTİNASYON SEÇ...">
                <button class="copy-btn" id="copyBtn" title="Koordinat Kopyala">KOPYALA</button>
            </div>
            <ul class="results-list" id="resultsList"></ul>
        </div>

        <div class="hud-arrow-container" id="hudArrowContainer">
            <div class="hud-arrow" id="hudArrow"></div>
        </div>

        <div class="hud-bottom-panel" id="hudBottomPanel">
            <div class="hud-stat">
                <span class="hud-label">HIZ</span>
                <span class="hud-value" id="hudSpeed">0<span class="hud-unit">KM/H</span></span>
            </div>
            <div class="hud-stat">
                <span class="hud-label">MESAFE</span>
                <span class="hud-value" id="hudDistance">0.0<span class="hud-unit">KM</span></span>
            </div>
            <div class="hud-stat">
                <span class="hud-label">SÜRE</span>
                <span class="hud-value" id="hudTime">00:00</span>
            </div>
        </div>
    </div>

    <script>
        // BURAYA MAPBOX ACCESS TOKENINIZI YAZIN
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiemFtcGFycmE3NiIsImEiOiJjbXFydTcxd3IwMWRjMnNzOTU1b2ZseXJ4In0.WtUhqD_3eCe2csSDe16asA';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        // Başlangıç Noktası (Balıkesir Merkez)
        const startCoords = [27.867274, 39.643375]; 
        let activeDestination = null;
        let carMarker = null;
        let animationFrameId = null;

        // Haritayı Başlat (Koyu Gece Teması)
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: startCoords,
            zoom: 15,
            pitch: 45, // NFSU2 sürüş perspektifi için harita eğimi
            bearing: 0
        });

        // Harita yüklendiğinde aracı koy
        map.on('load', () => {
            const el = document.createElement('div');
            el.className = 'car-marker';
            
            carMarker = new mapboxgl.Marker({ element: el })
                .setLngLat(startCoords)
                .addTo(map);

            // Harita üzerinde neon rota katmanı şeması hazırlığı
            map.addSource('route', {
                type: 'geojson',
                data: { type: 'Feature', properties: {}, geometry: { type: 'LineString', coordinates: [] } }
            });

            map.addLayer({
                id: 'route-line',
                type: 'line',
                source: 'route',
                layout: { 'line-join': 'round', 'line-cap': 'round' },
                paint: {
                    'line-color': '#00ccff',
                    'line-width': 6,
                    'line-blur': 2
                }
            });

            map.addLayer({
                id: 'route-glow',
                type: 'line',
                source: 'route',
                layout: { 'line-join': 'round', 'line-cap': 'round' },
                paint: {
                    'line-color': '#00ffcc',
                    'line-width': 2
                }
            });
        });

        // Adres Arama Metodu (Geocoding)
        const searchInput = document.getElementById('searchInput');
        const resultsList = document.getElementById('resultsList');

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 3) {
                resultsList.style.display = 'none';
                return;
            }

            // Mapbox Geocoding API çağrısı
            const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${MAPBOX_TOKEN}&proximity=${startCoords[0]},${startCoords[1]}&limit=5&language=tr`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                resultsList.innerHTML = '';
                if (data.features && data.features.length > 0) {
                    data.features.forEach(feature => {
                        const li = document.createElement('li');
                        li.textContent = feature.place_name;
                        li.addEventListener('click', () => selectDestination(feature));
                        resultsList.appendChild(li);
                    });
                    resultsList.style.display = 'block';
                } else {
                    resultsList.style.display = 'none';
                }
            } catch (err) {
                console.error("Arama hatası:", err);
            }
        });

        // Koordinat Kopyalama Fonksiyonu
        document.getElementById('copyBtn').addEventListener('click', () => {
            const coordsText = `${startCoords[1].toFixed(6)},${startCoords[0].toFixed(6)}`;
            navigator.clipboard.writeText(coordsText).then(() => {
                const origText = copyBtn.textContent;
                copyBtn.textContent = 'KOPYALANDI!';
                setTimeout(() => copyBtn.textContent = origText, 2000);
            });
        });

        // Destinasyon Seçildiğinde Çalışacak Akış
        async function selectDestination(feature) {
            activeDestination = feature.geometry.coordinates;
            
            // Arama çubuğunu uçur, tam ekrana geç
            document.getElementById('searchWrapper').classList.add('hidden');
            resultsList.style.display = 'none';

            // Arka planda Dijkstra / A* Heuristic hibrit çalışan Directions API'den rotayı çek
            const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${startCoords[0]},${startCoords[1]};${activeDestination[0]},${activeDestination[1]}?geometries=geojson&overview=full&access_token=${MAPBOX_TOKEN}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.routes && data.routes.length > 0) {
                    const routeGeoJSON = data.routes[0].geometry;
                    const duration = data.routes[0].duration; // saniye
                    const distance = data.routes[0].distance; // metre

                    // Rota çizgisini güncelle
                    map.getSource('route').setData({
                        type: 'Feature',
                        properties: {},
                        geometry: routeGeoJSON
                    });

                    // HUD elementlerini aktif et
                    document.getElementById('hudArrowContainer').style.display = 'flex';
                    document.getElementById('hudBottomPanel').style.display = 'flex';

                    // Simülasyonlu Rota Animasyonunu Başlat
                    animateRoute(routeGeoJSON.coordinates, distance, duration);
                }
            } catch (err) {
                console.error("Rota getirme hatası:", err);
                resetUI();
            }
        }

        // Rota Üzerinde Akıcı İlerleme ve HUD Güncelleme Animasyonu
        function animateRoute(coordinates, totalDistance, totalDuration) {
            const line = turf.lineString(coordinates);
            const chunkChunks = turf.length(line, {units: 'kilometers'});
            
            let distanceTravelled = 0;
            // NFSU2 arcade hız hissi için adımları yüksek tutalım
            const speedKmH = 140; 
            const step = (speedKmH / 3600) * 0.05; // Kare başına ilerleme mesafesi

            function frame() {
                distanceTravelled += step;

                if (distanceTravelled >= chunkChunks) {
                    // Hedefe varış
                    carMarker.setLngLat(coordinates[coordinates.length - 1]);
                    document.getElementById('hudSpeed').innerHTML = `0<span class="hud-unit">KM/H</span>`;
                    setTimeout(() => {
                        alert("HEDEFE ULAŞILDI!");
                        resetUI();
                    }, 1000);
                    return;
                }

                // Mevcut konum noktası hesaplama
                const currentPoint = turf.along(line, distanceTravelled, {units: 'kilometers'});
                const currentLngLat = currentPoint.geometry.coordinates;

                // Bir sonraki küçük adım (Açı/Yön tespiti için)
                const nextPoint = turf.along(line, distanceTravelled + 0.005, {units: 'kilometers'});
                
                // Aracın gidiş açısı (Bearing)
                const bearing = turf.bearing(currentPoint, nextPoint);

                // Destinasyona olan direkt kuşuçuşu açı (Üstteki Mavi Ok için)
                const targetPoint = turf.point(activeDestination);
                const absoluteTargetBearing = turf.bearing(currentPoint, targetPoint);
                // Harita kamerasının açısına göre okun sapma açısını düzeltiyoruz
                const relativeArrowBearing = absoluteTargetBearing - map.getBearing();

                // Aracın konumunu ve rotasyonunu güncelle (Neon Yeşil Üçgen)
                carMarker.setLngLat(currentLngLat);
                const markerEl = carMarker.getElement();
                markerEl.style.transform = `rotate(${bearing}deg)`;

                // Üstteki Mavi Yön Okunu Döndür
                document.getElementById('hudArrow').style.transform = `rotate(${relativeArrowBearing}deg)`;

                // Harita kamerasını araca sabitle ve haritayı gidiş yönüne çevir
                map.easeTo({
                    center: currentLngLat,
                    bearing: bearing,
                    zoom: 16.5,
                    duration: 0,
                    pitch: 55
                });

                // Alt Panel HUD Bilgilerini Dinamik Azaltarak Güncelle
                const remainingDistance = chunkChunks - distanceTravelled;
                const remainingProgressRatio = remainingDistance / chunkChunks;
                const remainingTimeSec = totalDuration * remainingProgressRatio;

                // Süre Formatlama (Saat:Dakika veya Dakika:Saniye)
                const mins = Math.floor(remainingTimeSec / 60);
                const secs = Math.floor(remainingTimeSec % 60);
                const timeString = mins > 0 ? `${mins}DK ${secs}SN` : `${secs}SN`;

                // Dalgalı arcade hızı simüle et
                const dynamicSpeed = Math.floor(speedKmH + (Math.sin(Date.now() / 200) * 8));

                document.getElementById('hudSpeed').innerHTML = `${dynamicSpeed}<span class="hud-unit">KM/H</span>`;
                document.getElementById('hudDistance').innerHTML = `${remainingDistance.toFixed(2)}<span class="hud-unit">KM</span>`;
                document.getElementById('hudTime').textContent = timeString;

                animationFrameId = requestAnimationFrame(frame);
            }

            animationFrameId = requestAnimationFrame(frame);
        }

        // Arayüzü İlk Haline Döndürme
        function resetUI() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            document.getElementById('searchWrapper').classList.remove('hidden');
            document.getElementById('hudArrowContainer').style.display = 'none';
            document.getElementById('hudBottomPanel').style.display = 'none';
            searchInput.value = '';

            // Haritayı sıfırla
            map.getSource('route').setData({
                type: 'Feature',
                properties: {},
                geometry: { type: 'LineString', coordinates: [] }
            });
            carMarker.setLngLat(startCoords);
            const markerEl = carMarker.getElement();
            markerEl.style.transform = `rotate(0deg)`;

            map.flyTo({
                center: startCoords,
                zoom: 15,
                bearing: 0,
                pitch: 45
            });
        }
    </script>
</body>
</html>
