<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NFSU NAV SYSTEMS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon: #00E5FF;
    --neon-dim: rgba(0,229,255,0.15);
    --neon-glow: 0 0 8px #00E5FF, 0 0 20px rgba(0,229,255,0.5);
    --green: #00FF66;
    --green-glow: 0 0 8px #00FF66, 0 0 20px rgba(0,255,102,0.5);
    --bg: #000000;
    --panel: rgba(0,0,0,0.88);
    --border: rgba(0,229,255,0.3);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.5);
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ─── SPLASH ─── */
  #splash {
    position: fixed; inset: 0; z-index: 9999;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
    transition: opacity 0.8s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }

  .splash-logo {
    font-size: clamp(20px, 6vw, 36px);
    font-weight: 900;
    letter-spacing: 0.25em;
    color: var(--neon);
    text-shadow: var(--neon-glow);
    text-align: center;
    line-height: 1.3;
  }
  .splash-logo span { display: block; font-size: 0.45em; letter-spacing: 0.5em; color: rgba(0,229,255,0.6); margin-top: 8px; }

  .splash-bar-wrap {
    width: min(280px, 70vw);
    height: 3px;
    background: rgba(0,229,255,0.15);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 2px;
    overflow: hidden;
  }
  .splash-bar {
    height: 100%; width: 0;
    background: var(--neon);
    box-shadow: var(--neon-glow);
    animation: loadbar 2.8s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes loadbar { 0%{width:0} 60%{width:70%} 90%{width:92%} 100%{width:100%} }

  .splash-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(0,229,255,0.5);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50%{opacity:0} }

  /* ─── MAP ─── */
  #map { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ─── SEARCH UI ─── */
  #search-ui {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 12px 12px 0;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease;
    transform: translateY(0);
    opacity: 1;
  }
  #search-ui.hidden {
    transform: translateY(-120%);
    opacity: 0;
    pointer-events: none;
  }

  .search-box {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.92);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0 14px;
    height: 48px;
    box-shadow: 0 0 20px rgba(0,229,255,0.1), inset 0 0 20px rgba(0,0,0,0.5);
  }
  .search-icon {
    color: var(--neon);
    font-size: 16px;
    flex-shrink: 0;
    text-shadow: var(--neon-glow);
  }
  #search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
  }
  #search-input::placeholder { color: rgba(255,255,255,0.3); }

  #suggestions {
    background: rgba(0,0,0,0.96);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    overflow: hidden;
    display: none;
    max-height: 240px;
    overflow-y: auto;
  }
  .suggestion-item {
    padding: 12px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    border-bottom: 1px solid rgba(0,229,255,0.08);
    letter-spacing: 0.05em;
    line-height: 1.4;
    transition: background 0.15s;
  }
  .suggestion-item:hover, .suggestion-item:active { background: rgba(0,229,255,0.1); color: var(--neon); }
  .suggestion-item .place-name { color: #fff; font-weight: bold; }
  .suggestion-item .place-address { color: rgba(255,255,255,0.45); font-size: 10px; margin-top: 2px; }

  /* ─── START NAV BUTTON ─── */
  #start-btn {
    position: fixed;
    bottom: 130px; left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: none;
    padding: 12px 32px;
    background: transparent;
    border: 1px solid var(--neon);
    border-radius: 3px;
    color: var(--neon);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--neon-glow), inset 0 0 20px rgba(0,229,255,0.05);
    transition: all 0.2s;
  }
  #start-btn:active { background: rgba(0,229,255,0.15); }

  /* ─── STOP NAV BUTTON ─── */
  #stop-btn {
    position: fixed;
    top: 14px; right: 12px;
    z-index: 200;
    display: none;
    padding: 10px 18px;
    background: rgba(0,0,0,0.9);
    border: 1px solid rgba(255,50,50,0.6);
    border-radius: 3px;
    color: rgba(255,80,80,1);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,50,50,0.4);
    transition: all 0.2s;
  }
  #stop-btn:active { background: rgba(255,50,50,0.15); }

  /* ─── COMPASS ─── */
  #compass {
    position: fixed;
    top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .compass-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: rgba(0,229,255,0.6);
  }
  .compass-ring {
    width: 48px; height: 48px;
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 0 12px rgba(0,229,255,0.2);
  }
  #compass-arrow {
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 22px solid var(--neon);
    filter: drop-shadow(0 0 4px #00E5FF);
    transform-origin: center 66%;
    transition: transform 0.3s ease;
  }
  .compass-dist {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--neon);
    letter-spacing: 0.1em;
  }

  /* ─── CENTER BUTTON ─── */
  #center-btn {
    position: fixed;
    right: 12px; bottom: 140px;
    z-index: 200;
    display: none;
    padding: 10px 14px;
    background: rgba(0,0,0,0.9);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--neon);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    box-shadow: var(--neon-glow);
    transition: all 0.2s;
  }
  #center-btn:active { background: rgba(0,229,255,0.1); }

  /* ─── HUD PANEL ─── */
  #hud {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(0,0,0,0.93);
    border-top: 1px solid rgba(0,229,255,0.25);
    padding: 12px 16px 20px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    grid-template-rows: auto auto;
    gap: 6px 16px;
    box-shadow: 0 -4px 30px rgba(0,229,255,0.08);
    pointer-events: none;
  }

  .hud-street {
    grid-column: 1 / -1;
    grid-row: 1;
    display: flex; align-items: center; gap: 8px;
  }
  .hud-street-icon {
    color: var(--neon);
    font-size: 12px;
    flex-shrink: 0;
  }
  #hud-street-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .hud-metrics {
    grid-column: 1 / -1;
    grid-row: 2;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .hud-metric {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px;
    position: relative;
  }
  .hud-metric::after {
    content: '';
    position: absolute; right: 0; top: 10%; bottom: 10%;
    width: 1px;
    background: rgba(0,229,255,0.15);
  }
  .hud-metric:last-child::after { display: none; }
  .hud-metric-label {
    font-size: 8px;
    letter-spacing: 0.25em;
    color: rgba(0,229,255,0.6);
    text-transform: uppercase;
  }
  .hud-metric-value {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 700;
    color: var(--neon);
    text-shadow: var(--neon-glow);
    line-height: 1;
  }
  .hud-metric-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
  }

  /* ─── SCAN LINE EFFECT ─── */
  #scanlines {
    position: fixed; inset: 0; z-index: 50;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ─── ERROR TOAST ─── */
  #toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    z-index: 500;
    background: rgba(0,0,0,0.95);
    border: 1px solid rgba(255,80,80,0.5);
    border-radius: 3px;
    padding: 10px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(255,120,120,1);
    white-space: nowrap;
    display: none;
    box-shadow: 0 0 12px rgba(255,50,50,0.3);
  }

  /* ─── MAPBOX OVERRIDES ─── */
  .mapboxgl-ctrl-attrib { display: none !important; }
  .mapboxgl-ctrl-logo { display: none !important; }
  .mapboxgl-ctrl-group { display: none !important; }

  /* corner decorations */
  #hud::before {
    content: '';
    position: absolute;
    top: -1px; left: 0;
    width: 40px; height: 3px;
    background: var(--neon);
    box-shadow: var(--neon-glow);
  }
  #hud::after {
    content: '';
    position: absolute;
    top: -1px; right: 0;
    width: 40px; height: 3px;
    background: var(--neon);
    box-shadow: var(--neon-glow);
  }
  #hud { position: fixed; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">
    NFSU NAV SYSTEMS
    <span>TACTICAL NAVIGATION UNIT v2.0</span>
  </div>
  <div class="splash-bar-wrap">
    <div class="splash-bar"></div>
  </div>
  <div class="splash-status">INITIALIZING GPS SYSTEMS...</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- SCAN LINES -->
<div id="scanlines"></div>

<!-- SEARCH UI -->
<div id="search-ui">
  <div class="search-box">
    <div class="search-icon">◈</div>
    <input type="text" id="search-input" placeholder="ENTER DESTINATION COORDINATES..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div id="suggestions"></div>
</div>

<!-- COMPASS -->
<div id="compass">
  <div class="compass-label">BEARING</div>
  <div class="compass-ring">
    <div id="compass-arrow"></div>
  </div>
  <div class="compass-dist" id="compass-dist-label">--</div>
</div>

<!-- STOP BUTTON -->
<button id="stop-btn">■ ABORT</button>

<!-- CENTER BUTTON -->
<button id="center-btn">⊕ CENTER</button>

<!-- START BUTTON -->
<button id="start-btn">▶ START NAVIGATION</button>

<!-- HUD -->
<div id="hud" style="position:fixed;">
  <div class="hud-street">
    <div class="hud-street-icon">⬡</div>
    <div id="hud-street-name">AWAITING GPS SIGNAL...</div>
  </div>
  <div class="hud-metrics">
    <div class="hud-metric">
      <div class="hud-metric-label">SPEED</div>
      <div class="hud-metric-value" id="hud-speed">0</div>
      <div class="hud-metric-unit">KM/H</div>
    </div>
    <div class="hud-metric">
      <div class="hud-metric-label">DISTANCE</div>
      <div class="hud-metric-value" id="hud-dist">--</div>
      <div class="hud-metric-unit" id="hud-dist-unit">KM</div>
    </div>
    <div class="hud-metric">
      <div class="hud-metric-label">ETA</div>
      <div class="hud-metric-value" id="hud-eta" style="font-size:clamp(13px,3.5vw,18px)">--:--</div>
      <div class="hud-metric-unit">TIME</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// REPLACE THIS WITH YOUR MAPBOX ACCESS TOKEN
const MAPBOX_TOKEN = 'pk.eyJ1IjoiemFtcGFycmE3NiIsImEiOiJjbXFydTcxd3IwMWRjMnNzOTU1b2ZseXJ4In0.WtUhqD_3eCe2csSDe16asA';
// ─────────────────────────────────────────────────────────────────────────────

// ─── STATE ───────────────────────────────────────────────────────────────────
let map;
let userLng = null, userLat = null;
let userHeading = 0;
let deviceHeading = null;
let gpsWatchId = null;
let vehicleMarker = null;
let destMarker = null;
let destinationCoords = null;
let routeCoords = [];
let routeTotalDistance = 0;
let routeTotalDuration = 0;
let followUser = true;
let isNavigating = false;
let searchDebounce = null;

// ─── UTILS ───────────────────────────────────────────────────────────────────
function showToast(msg, dur = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.style.display = 'none'; }, dur);
}

function formatETA(seconds) {
  if (!seconds || seconds <= 0) return '--:--';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (h > 0) return `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m`;
  return `${m}m`;
}

function formatDist(km) {
  if (km === null || km === undefined || isNaN(km)) return ['--', 'KM'];
  if (km < 1) return [Math.round(km * 1000).toString(), 'M'];
  return [km.toFixed(1), 'KM'];
}

function bearing(from, to) {
  const dLng = (to[0] - from[0]) * Math.PI / 180;
  const lat1 = from[1] * Math.PI / 180;
  const lat2 = to[1] * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ─── PLUS CODE PARSER ────────────────────────────────────────────────────────
function isPlusCode(str) {
  return /^[23456789CFGHJMPQRVWX]{4,8}\+[23456789CFGHJMPQRVWX]{2,3}(\s+.+)?$/i.test(str.trim());
}

// ─── SPLASH ──────────────────────────────────────────────────────────────────
setTimeout(() => {
  const splash = document.getElementById('splash');
  splash.classList.add('hidden');
  setTimeout(() => { splash.style.display = 'none'; }, 800);
  initApp();
}, 3200);

// ─── INIT ─────────────────────────────────────────────────────────────────────
function initApp() {
  if (!MAPBOX_TOKEN || MAPBOX_TOKEN === 'YOUR_MAPBOX_ACCESS_TOKEN') {
    showToast('⚠ INSERT MAPBOX TOKEN IN SOURCE CODE', 8000);
  }

  mapboxgl.accessToken = MAPBOX_TOKEN;

  map = new mapboxgl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        'mapbox-streets': {
          type: 'vector',
          url: 'mapbox://mapbox.mapbox-streets-v8'
        }
      },
      layers: [
        {
          id: 'background',
          type: 'background',
          paint: { 'background-color': '#000000' }
        },
        {
          id: 'water',
          type: 'fill',
          source: 'mapbox-streets',
          'source-layer': 'water',
          paint: { 'fill-color': '#0a0a0f' }
        },
        {
          id: 'landuse',
          type: 'fill',
          source: 'mapbox-streets',
          'source-layer': 'landuse',
          paint: { 'fill-color': '#050508' }
        },
        {
          id: 'parks',
          type: 'fill',
          source: 'mapbox-streets',
          'source-layer': 'landuse',
          filter: ['in','class','park','pitch','grass','cemetery','garden','wood','scrub','forest'],
          paint: { 'fill-color': '#050f06' }
        },
        {
          id: 'buildings',
          type: 'fill',
          source: 'mapbox-streets',
          'source-layer': 'building',
          paint: { 'fill-color': '#0c0c14', 'fill-outline-color': '#111120' }
        },
        {
          id: 'roads-minor',
          type: 'line',
          source: 'mapbox-streets',
          'source-layer': 'road',
          filter: ['in','class','street','street_limited','service','track','path'],
          paint: { 'line-color': '#282838', 'line-width': ['interpolate',['linear'],['zoom'],12,0.5,18,2] }
        },
        {
          id: 'roads-secondary',
          type: 'line',
          source: 'mapbox-streets',
          'source-layer': 'road',
          filter: ['in','class','secondary','tertiary','primary_link','secondary_link','tertiary_link'],
          paint: { 'line-color': '#3a3a52', 'line-width': ['interpolate',['linear'],['zoom'],10,1,18,5] }
        },
        {
          id: 'roads-primary',
          type: 'line',
          source: 'mapbox-streets',
          'source-layer': 'road',
          filter: ['in','class','primary','trunk','trunk_link'],
          paint: { 'line-color': '#555575', 'line-width': ['interpolate',['linear'],['zoom'],8,1,18,8] }
        },
        {
          id: 'roads-motorway',
          type: 'line',
          source: 'mapbox-streets',
          'source-layer': 'road',
          filter: ['in','class','motorway','motorway_link'],
          paint: { 'line-color': '#ffffff', 'line-width': ['interpolate',['linear'],['zoom'],6,1,18,10] }
        },
        {
          id: 'roads-motorway-glow',
          type: 'line',
          source: 'mapbox-streets',
          'source-layer': 'road',
          filter: ['in','class','motorway','motorway_link'],
          paint: { 'line-color': 'rgba(255,255,255,0.08)', 'line-width': ['interpolate',['linear'],['zoom'],6,3,18,18], 'line-blur': 4 }
        },
        {
          id: 'road-labels',
          type: 'symbol',
          source: 'mapbox-streets',
          'source-layer': 'road',
          layout: {
            'text-field': ['get','name'],
            'text-font': ['DIN Pro Regular','Arial Unicode MS Regular'],
            'text-size': 10,
            'symbol-placement': 'line',
            'text-max-angle': 30
          },
          paint: { 'text-color': 'rgba(255,255,255,0.35)', 'text-halo-color': 'rgba(0,0,0,0.8)', 'text-halo-width': 2 }
        },
        {
          id: 'place-labels',
          type: 'symbol',
          source: 'mapbox-streets',
          'source-layer': 'place_label',
          layout: {
            'text-field': ['get','name'],
            'text-font': ['DIN Pro Bold','Arial Unicode MS Bold'],
            'text-size': ['interpolate',['linear'],['zoom'],8,10,14,14]
          },
          paint: { 'text-color': 'rgba(255,255,255,0.5)', 'text-halo-color': 'rgba(0,0,0,0.9)', 'text-halo-width': 2 }
        }
      ]
    },
    center: [28.9784, 41.0082],
    zoom: 14,
    pitch: 0,
    bearing: 0,
    antialias: true
  });

  map.on('load', () => {
    setupRouteLayers();
    startGPS();
  });

  map.on('dragstart', () => {
    if (followUser) {
      followUser = false;
      document.getElementById('center-btn').style.display = 'block';
    }
  });

  setupSearch();
  setupButtons();
  setupDeviceOrientation();
}

// ─── ROUTE LAYERS ─────────────────────────────────────────────────────────────
function setupRouteLayers() {
  map.addSource('route', {
    type: 'geojson',
    data: { type: 'Feature', properties: {}, geometry: { type: 'LineString', coordinates: [] } }
  });

  // Glow layer (wide, semi-transparent)
  map.addLayer({
    id: 'route-glow',
    type: 'line',
    source: 'route',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: {
      'line-color': 'rgba(0,229,255,0.25)',
      'line-width': 16,
      'line-blur': 8
    }
  });

  // Main route line
  map.addLayer({
    id: 'route-line',
    type: 'line',
    source: 'route',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: {
      'line-color': '#00E5FF',
      'line-width': 4,
      'line-opacity': 1
    }
  });

  // Inner highlight (bright core)
  map.addLayer({
    id: 'route-core',
    type: 'line',
    source: 'route',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: {
      'line-color': '#ffffff',
      'line-width': 1.5,
      'line-opacity': 0.7
    }
  });
}

function setRouteData(coords) {
  if (!map.getSource('route')) return;
  map.getSource('route').setData({
    type: 'Feature',
    properties: {},
    geometry: { type: 'LineString', coordinates: coords }
  });
}

// ─── GPS ──────────────────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) {
    showToast('⚠ GPS NOT AVAILABLE ON THIS DEVICE');
    return;
  }
  gpsWatchId = navigator.geolocation.watchPosition(onGPSUpdate, onGPSError, {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 10000
  });
}

function onGPSUpdate(pos) {
  const { longitude, latitude, speed, heading } = pos.coords;
  const prevLng = userLng, prevLat = userLat;
  userLng = longitude;
  userLat = latitude;

  // Speed
  const spd = speed != null ? Math.round(speed * 3.6) : 0;
  document.getElementById('hud-speed').textContent = spd;

  // GPS heading fallback
  if (heading != null && !isNaN(heading)) userHeading = heading;
  else if (prevLng != null) {
    userHeading = bearing([prevLng, prevLat], [userLng, userLat]);
  }

  updateVehicleMarker();

  if (followUser) {
    map.easeTo({ center: [userLng, userLat], duration: 600 });
  }

  updateStreetName();

  if (isNavigating && destinationCoords && routeCoords.length > 0) {
    updateDistanceETA();
    updateCompass();
    checkReroute();
  }
}

function onGPSError(err) {
  showToast('⚠ GPS ERROR: ' + err.message.toUpperCase());
}

// ─── VEHICLE MARKER ───────────────────────────────────────────────────────────
function createVehicleMarker() {
  const el = document.createElement('div');
  el.id = 'vehicle-el';
  el.style.cssText = `
    width: 0; height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-bottom: 24px solid #00FF66;
    filter: drop-shadow(0 0 6px #00FF66) drop-shadow(0 0 12px rgba(0,255,102,0.5));
    transform-origin: center 80%;
    transition: transform 0.3s ease;
    pointer-events: none;
  `;
  return el;
}

function updateVehicleMarker() {
  if (!vehicleMarker) {
    const el = createVehicleMarker();
    vehicleMarker = new mapboxgl.Marker({ element: el, anchor: 'center' })
      .setLngLat([userLng, userLat])
      .addTo(map);
  } else {
    vehicleMarker.setLngLat([userLng, userLat]);
  }
  const hdg = deviceHeading !== null ? deviceHeading : userHeading;
  vehicleMarker.getElement().style.transform = `rotate(${hdg}deg)`;
}

// ─── DEVICE ORIENTATION ───────────────────────────────────────────────────────
function setupDeviceOrientation() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+
    document.body.addEventListener('click', function askOrient() {
      DeviceOrientationEvent.requestPermission().then(res => {
        if (res === 'granted') listenOrientation();
      }).catch(() => {});
      document.body.removeEventListener('click', askOrient);
    }, { once: true });
  } else {
    listenOrientation();
  }
}

function listenOrientation() {
  window.addEventListener('deviceorientationabsolute', handleOrientation, true);
  window.addEventListener('deviceorientation', handleOrientation, true);
}

function handleOrientation(e) {
  let alpha = e.alpha;
  if (e.webkitCompassHeading !== undefined) {
    alpha = e.webkitCompassHeading;
  } else if (alpha !== null) {
    alpha = (360 - alpha) % 360;
  }
  if (alpha !== null) {
    deviceHeading = alpha;
    if (vehicleMarker) {
      vehicleMarker.getElement().style.transform = `rotate(${alpha}deg)`;
    }
  }
}

// ─── STREET NAME ─────────────────────────────────────────────────────────────
function updateStreetName() {
  if (!map || userLng === null) return;
  try {
    const pt = map.project([userLng, userLat]);
    const bbox = [
      [pt.x - 20, pt.y - 20],
      [pt.x + 20, pt.y + 20]
    ];
    const features = map.queryRenderedFeatures(bbox, {
      layers: ['roads-motorway', 'roads-primary', 'roads-secondary', 'roads-minor']
    });
    if (features && features.length > 0) {
      const name = features[0].properties.name || features[0].properties.ref || null;
      document.getElementById('hud-street-name').textContent =
        name ? name.toUpperCase() : 'UNNAMED ROAD';
    }
  } catch (e) {}
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('search-input');
  const sugg = document.getElementById('suggestions');

  input.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    const q = input.value.trim();
    if (q.length < 2) { sugg.style.display = 'none'; return; }
    searchDebounce = setTimeout(() => fetchSuggestions(q), 350);
  });

  input.addEventListener('focus', () => {
    if (input.value.trim().length >= 2) sugg.style.display = 'block';
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#search-ui')) sugg.style.display = 'none';
  });
}

async function fetchSuggestions(query) {
  if (!MAPBOX_TOKEN || MAPBOX_TOKEN === 'YOUR_MAPBOX_ACCESS_TOKEN') return;
  const sugg = document.getElementById('suggestions');

  let searchQuery = query;
  if (isPlusCode(query)) searchQuery = query; // Mapbox handles plus codes

  const prox = userLng !== null ? `&proximity=${userLng},${userLat}` : '';
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(searchQuery)}.json?access_token=${MAPBOX_TOKEN}&autocomplete=true&limit=5${prox}&language=tr,en`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.features || data.features.length === 0) {
      sugg.style.display = 'none'; return;
    }
    sugg.innerHTML = '';
    data.features.forEach(f => {
      const item = document.createElement('div');
      item.className = 'suggestion-item';
      const placeName = f.text || f.place_name.split(',')[0];
      const placeAddr = f.place_name;
      item.innerHTML = `<div class="place-name">${placeName.toUpperCase()}</div><div class="place-address">${placeAddr}</div>`;
      item.addEventListener('click', () => {
        document.getElementById('search-input').value = f.place_name;
        sugg.style.display = 'none';
        selectDestination(f.center, f.place_name);
      });
      sugg.appendChild(item);
    });
    sugg.style.display = 'block';
  } catch (e) {
    showToast('⚠ SEARCH FAILED: CHECK CONNECTION');
  }
}

// ─── DESTINATION ──────────────────────────────────────────────────────────────
function selectDestination(coords, name) {
  destinationCoords = coords;

  // Remove existing dest marker
  if (destMarker) destMarker.remove();

  // Blue destination marker
  const el = document.createElement('div');
  el.style.cssText = `
    width: 18px; height: 18px;
    background: #00E5FF;
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 10px #00E5FF, 0 0 24px rgba(0,229,255,0.6);
  `;
  destMarker = new mapboxgl.Marker({ element: el, anchor: 'center' })
    .setLngLat(coords)
    .addTo(map);

  map.flyTo({ center: coords, zoom: 14, duration: 1000 });

  // Show start button
  document.getElementById('start-btn').style.display = 'block';

  // Fetch route
  fetchRoute(coords);
}

// ─── DIRECTIONS API ───────────────────────────────────────────────────────────
async function fetchRoute(dest) {
  if (userLng === null) { showToast('⚠ GPS SIGNAL REQUIRED'); return; }
  if (!MAPBOX_TOKEN || MAPBOX_TOKEN === 'YOUR_MAPBOX_ACCESS_TOKEN') return;

  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${userLng},${userLat};${dest[0]},${dest[1]}?geometries=geojson&steps=false&overview=full&access_token=${MAPBOX_TOKEN}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.routes || data.routes.length === 0) {
      showToast('⚠ NO ROUTE FOUND'); return;
    }
    const route = data.routes[0];
    routeCoords = route.geometry.coordinates;
    routeTotalDistance = route.distance / 1000; // km
    routeTotalDuration = route.duration; // seconds
    setRouteData(routeCoords);
    updateDistanceETA();
  } catch (e) {
    showToast('⚠ ROUTE FETCH FAILED');
  }
}

// ─── CLIENT-SIDE DISTANCE/ETA ─────────────────────────────────────────────────
function updateDistanceETA() {
  if (!routeCoords.length || userLng === null) return;

  const userPt = turf.point([userLng, userLat]);
  const line = turf.lineString(routeCoords);

  // Find nearest point on route
  const snapped = turf.nearestPointOnLine(line, userPt, { units: 'kilometers' });
  const idx = snapped.properties.index;

  // Remaining coords from snap point
  let remaining = routeCoords.slice(idx);
  if (remaining.length < 2) {
    document.getElementById('hud-dist').textContent = '0';
    document.getElementById('hud-dist-unit').textContent = 'M';
    document.getElementById('hud-eta').textContent = '0m';
    document.getElementById('compass-dist-label').textContent = '0m';
    return;
  }

  const remainLine = turf.lineString(remaining);
  const remDist = turf.length(remainLine, { units: 'kilometers' });

  // Speed-based ETA or proportional
  const fraction = remDist / routeTotalDistance;
  const remSecs = routeTotalDuration * fraction;

  const [dVal, dUnit] = formatDist(remDist);
  document.getElementById('hud-dist').textContent = dVal;
  document.getElementById('hud-dist-unit').textContent = dUnit;
  document.getElementById('hud-eta').textContent = formatETA(remSecs);

  // Compass distance label
  document.getElementById('compass-dist-label').textContent =
    remDist < 1 ? `${Math.round(remDist * 1000)}M` : `${remDist.toFixed(1)}KM`;
}

// ─── REROUTE CHECK ────────────────────────────────────────────────────────────
let lastReroute = 0;
function checkReroute() {
  if (!routeCoords.length || userLng === null) return;
  const now = Date.now();
  if (now - lastReroute < 5000) return; // throttle

  const userPt = turf.point([userLng, userLat]);
  const line = turf.lineString(routeCoords);
  const snapped = turf.nearestPointOnLine(line, userPt, { units: 'meters' });
  const distFromRoute = snapped.properties.dist;

  if (distFromRoute > 0.07) { // 70m
    lastReroute = now;
    fetchRoute(destinationCoords);
  }
}

// ─── COMPASS ─────────────────────────────────────────────────────────────────
function updateCompass() {
  if (!destinationCoords || userLng === null) return;
  const bear = bearing([userLng, userLat], destinationCoords);
  const hdg = deviceHeading !== null ? deviceHeading : userHeading;
  const rel = (bear - hdg + 360) % 360;
  document.getElementById('compass-arrow').style.transform = `rotate(${rel}deg)`;
}

// ─── NAVIGATION CONTROL ───────────────────────────────────────────────────────
function setupButtons() {
  document.getElementById('start-btn').addEventListener('click', startNavigation);
  document.getElementById('stop-btn').addEventListener('click', stopNavigation);
  document.getElementById('center-btn').addEventListener('click', () => {
    followUser = true;
    document.getElementById('center-btn').style.display = 'none';
    if (userLng !== null) map.easeTo({ center: [userLng, userLat], duration: 600 });
  });
}

function startNavigation() {
  if (!routeCoords.length) { showToast('⚠ SET DESTINATION FIRST'); return; }
  isNavigating = true;

  // Hide search, show controls
  document.getElementById('search-ui').classList.add('hidden');
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'block';
  document.getElementById('compass').style.display = 'flex';

  // Fit route bounds
  const bounds = routeCoords.reduce((b, c) => b.extend(c), new mapboxgl.LngLatBounds(routeCoords[0], routeCoords[0]));
  map.fitBounds(bounds, { padding: { top: 80, bottom: 160, left: 40, right: 40 }, duration: 1200 });

  setTimeout(() => { followUser = true; }, 2000);
}

function stopNavigation() {
  isNavigating = false;
  followUser = true;

  document.getElementById('search-ui').classList.remove('hidden');
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('compass').style.display = 'none';
  document.getElementById('start-btn').style.display = destinationCoords ? 'block' : 'none';
  document.getElementById('center-btn').style.display = 'none';

  document.getElementById('hud-dist').textContent = '--';
  document.getElementById('hud-eta').textContent = '--:--';
  document.getElementById('compass-dist-label').textContent = '--';
}
</script>
