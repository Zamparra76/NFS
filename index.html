<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFSU2 Nav Systems</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --amoled-black: #000000;
            --dark-gray: #0d1117;
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --panel-bg: rgba(0, 0, 0, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--amoled-black);
        }

        /* --- LOADING SCREEN --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--amoled-black);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-out, transform 1s ease-out;
        }

        .loading-title {
            color: var(--neon-blue);
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--neon-blue);
            text-align: center;
        }

        .progress-container {
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0082ff, var(--neon-blue));
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.1s linear;
        }

        /* --- MAP CONTAINER --- */
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            z-index: 1;
        }

        /* --- INTERFACE OVERLAYS --- */
        .ui-element {
            position: absolute;
            z-index: 10;
            pointer-events: auto;
        }

        /* Search Panel */
        #search-container {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            border-radius: 4px;
            padding: 10px;
            transition: all 0.5s ease;
        }

        .search-row {
            display: flex;
            gap: 10px;
        }

        #search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.5);
            padding: 12px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 4px;
            outline: none;
            letter-spacing: 1px;
        }

        #search-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 0 15px;
            cursor: pointer;
            font-weight: 700;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* Geocoding Results */
        #results-list {
            margin-top: 10px;
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
            border-top: 1px solid rgba(0, 240, 255, 0.2);
            display: none;
        }

        #results-list li {
            padding: 12px;
            color: #ccc;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        #results-list li:hover {
            background: rgba(0, 240, 255, 0.15);
            color: var(--neon-blue);
            padding-left: 18px;
        }

        /* --- HUD DIRECTION ARROW --- */
        #hud-arrow-container {
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        #hud-arrow {
            width: 80px;
            height: 80px;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 0 12px var(--neon-blue));
        }

        /* --- DASHBOARD PANEL --- */
        #dashboard-panel {
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
            border-radius: 8px 8px 0 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #dashboard-panel.active {
            bottom: 0;
        }

        .dash-stat {
            text-align: center;
        }

        .dash-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .dash-value {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .dash-unit {
            font-size: 0.8rem;
            color: #fff;
            margin-left: 3px;
        }

        /* --- NOTIFICATION OVERLAY --- */
        #notification-box {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 30px var(--neon-green);
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 100;
        }

        #notification-box.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #notification-box h2 {
            color: var(--neon-green);
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        #notification-box p {
            color: #fff;
            font-size: 1rem;
        }

        /* --- CUSTOM VECHICLE MARKER --- */
        .vehicle-marker {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 28px solid var(--neon-green);
            filter: drop-shadow(0 0 8px var(--neon-green));
            cursor: pointer;
            transition: transform 0.1s ease-out;
        }

        /* Custom Scrollbar for results */
        #results-list::-webkit-scrollbar {
            width: 6px;
        }
        #results-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        #results-list::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-title">NFSU NAV SYSTEMS</div>
        <div class="progress-container">
            <div class="progress-bar" id="load-progress"></div>
        </div>
    </div>

    <div id="map"></div>

    <div id="search-container" class="ui-element">
        <div class="search-row">
            <input type="text" id="search-input" placeholder="HEDEF ARA VEYA KOORDİNAT YAPIŞTIR..." autocomplete="off">
            <button class="icon-btn" id="paste-btn" title="Koordinattan Navigasyon Başlat">
                PASTE
            </button>
        </div>
        <ul id="results-list"></ul>
    </div>

    <div id="hud-arrow-container" class="ui-element">
        <svg id="hud-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 12H7V22H17V12H22L12 2Z" fill="#00f0ff" />
        </svg>
        <div style="color: var(--neon-blue); font-size: 0.75rem; font-weight: bold; margin-top: 5px; text-shadow: 0 0 5px var(--neon-blue);">TARGET</div>
    </div>

    <div id="dashboard-panel" class="ui-element">
        <div class="dash-stat">
            <div class="dash-label">HIZ</div>
            <div class="dash-value" id="dash-speed">0<span class="dash-unit">KM/H</span></div>
        </div>
        <div class="dash-stat">
            <div class="dash-label">KALAN MESAFE</div>
            <div class="dash-value" id="dash-dist">0.0<span class="dash-unit">KM</span></div>
        </div>
        <div class="dash-stat">
            <div class="dash-label">SÜRE</div>
            <div class="dash-value" id="dash-time">00:00</div>
        </div>
    </div>

    <div id="notification-box">
        <h2>HEDEFE VARILDI!</h2>
        <p>Navigasyon simülasyonu başarıyla tamamlandı.</p>
    </div>

    <script>
        // ==========================================
        // TOKEN GİZLİLİĞİ VE KONFİGÜRASYON
        // ==========================================
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiemFtcGFycmE3NiIsImEiOiJjbXFydTcxd3IwMWRjMnNzOTU1b2ZseXJ4In0.WtUhqD_3eCe2csSDe16asA';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        // Varsayılan Merkez: Balıkesir Koordinatları
        const startCoords = [27.867274, 39.643375]; 
        
        let map;
        let vehicleMarker;
        let animationFrameId = null;
        let routeCoordinates = [];
        let currentStepIndex = 0;
        let totalSteps = 0;
        let destinationCoords = null;

        // --- Sahte Yükleme Ekranı İlerleme Yönetimi ---
        const progressBar = document.getElementById('load-progress');
        const loadingScreen = document.getElementById('loading-screen');
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress > 100) progress = 100;
            progressBar.style.width = `${progress}%`;
            
            if (progress === 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.transform = 'scale(1.1)';
                    setTimeout(() => loadingScreen.style.display = 'none', 1000);
                }, 400);
            }
        }, 100);

        // --- Mapbox Harita Girişi ---
        map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/navigation-night-v1', // AMOELD Gece Navigasyon Stili
            center: startCoords,
            zoom: 14,
            pitch: 50,
            bearing: 0,
            attributionControl: false
        });

        // --- Özel Neon Yeşil Araç İkonunun Oluşturulması ---
        const el = document.createElement('div');
        el.className = 'vehicle-marker';

        map.on('load', () => {
            // Harita üzerine aracı yerleştir
            vehicleMarker = new mapboxgl.Marker({
                element: el,
                rotationAlignment: 'map',
                pitchAlignment: 'map'
            })
            .setLngLat(startCoords)
            .addTo(map);

            // Rota Katmanlarının Tanımlanması (Boş GeoJSON ile başlatılıyor)
            map.addSource('route', {
                type: 'geojson',
                data: {
                    type: 'Feature',
                    properties: {},
                    geometry: { type: 'LineString', coordinates: [] }
                }
            });

            // Neon Glow Efektli Rota Çizgisi Tasarımı
            map.addLayer({
                id: 'route-line',
                type: 'line',
                source: 'route',
                layout: { 'line-join': 'round', 'line-cap': 'round' },
                paint: {
                    'line-color': '#00f0ff',
                    'line-width': 6,
                    'line-blur': 1
                }
            });

            map.addLayer({
                id: 'route-glow',
                type: 'line',
                source: 'route',
                layout: { 'line-join': 'round', 'line-cap': 'round' },
                paint: {
                    'line-color': '#00f0ff',
                    'line-width': 14,
                    'line-blur': 8,
                    'line-opacity': 0.6
                }
            });
        });

        // ==========================================
        // ADRES ARAMA VE COORD GEOPROCESSING (GEOCODING)
        // ==========================================
        const searchInput = document.getElementById('search-input');
        const resultsList = document.getElementById('results-list');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (query.length < 3) {
                resultsList.style.display = 'none';
                return;
            }

            // Mapbox Geocoding API Çağrısı
            fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${MAPBOX_TOKEN}&proximity=${startCoords[0]},${startCoords[1]}&language=tr`)
                .then(res => res.json())
                .then(data => {
                    resultsList.innerHTML = '';
                    if (data.features && data.features.length > 0) {
                        resultsList.style.display = 'block';
                        data.features.forEach(feature => {
                            const li = document.createElement('li');
                            li.textContent = feature.place_name;
                            li.addEventListener('click', () => {
                                destinationCoords = feature.geometry.coordinates;
                                startNavigation(destinationCoords);
                            });
                            resultsList.appendChild(li);
                        });
                    } else {
                        resultsList.style.display = 'none';
                    }
                }).catch(err => console.error("Geocoding Hatası:", err));
        });

        // Koordinat Kopyalama & Arama Fonksiyonu
        document.getElementById('paste-btn').addEventListener('click', () => {
            navigator.clipboard.readText().then(text => {
                processCoordinateInput(text);
            }).catch(() => {
                // Clipboard API reddedilirse manuel input kontrolü
                processCoordinateInput(searchInput.value);
            });
        });

        function processCoordinateInput(text) {
            // Örn: (39.643375, 27.867274) veya 39.643375, 27.867274 yakalama
            const coordRegex = /([-+]?\d{1,2}\.\d+)\s*,\s*([-+]?\d{1,3}\.\d+)/;
            const match = text.match(coordRegex);
            
            if (match) {
                const lat = parseFloat(match[1]);
                const lng = parseFloat(match[2]);
                // Mapbox [lng, lat] formatı kullandığı için ters çeviriyoruz
                destinationCoords = [lng, lat];
                searchInput.value = `${lat}, ${lng}`;
                startNavigation(destinationCoords);
            } else {
                alert("Geçerli bir koordinat formatı bulunamadı! Örn: 39.643375, 27.867274");
            }
        }

        // ==========================================
        // ROUTING (MAPBOX DIRECTIONS API)
        // ==========================================
        function startNavigation(targetCoords) {
            // Arayüz elemanlarını gizle/göster (Tam ekran Navigasyon Modu)
            document.getElementById('search-container').style.transform = 'translateX(-50%) translateY(-150px)';
            resultsList.style.display = 'none';
            document.getElementById('hud-arrow-container').style.display = 'flex';
            
            const origin = `${startCoords[0]},${startCoords[1]}`;
            const destination = `${targetCoords[0]},${targetCoords[1]}`;

            /* AÇIKLAMA: Mapbox Directions API, arka planda en optimal rotayı türetmek için 
              Dijkstra ve A* (A-Star) Heuristic yön bulma algoritmalarını hibrit bir yapıda kullanmaktadır. 
              Gelişmiş hiyerarşik daraltma (Contraction Hierarchies) mimarisi sayesinde saniyeler içinde 
              gerçek zamanlı trafik ve yol geometrisine uygun çizim gerçekleştirir.
            */
            fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${origin};${destination}?geometries=geojson&overview=full&access_token=${MAPBOX_TOKEN}`)
                .then(res => res.json())
                .then(data => {
                    if (!data.routes || data.routes.length === 0) {
                        alert("Rota bulunamadı.");
                        resetUI();
                        return;
                    }

                    const route = data.routes[0];
                    const geometry = route.geometry;
                    
                    // Haritadaki rotayı güncelle
                    map.getSource('route').setData({
                        type: 'Feature',
                        properties: {},
                        geometry: geometry
                    });

                    // İnterpolasyon ile adımları akıcı hale getirme (Simülasyon Çözünürlüğü Artırma)
                    buildSmoothRoute(geometry.coordinates, route.duration, route.distance);
                })
                .catch(err => {
                    console.error("Directions Hatası:", err);
                    resetUI();
                });
        }

        // --- Rota İnterpolasyon ve Mesafe Hesaplayıcı ---
        function buildSmoothRoute(coords, duration, distance) {
            routeCoordinates = [];
            // Noktalar arasındaki mesafeleri bölerek akıcı bir akış üretiyoruz
            for (let i = 0; i < coords.length - 1; i++) {
                const p1 = coords[i];
                const p2 = coords[i+1];
                const segmentDist = getDistance(p1, p2);
                const steps = Math.max(Math.floor(segmentDist * 150), 3); // Segment başına örneklem yoğunluğu
                
                for (let s = 0; s < steps; s++) {
                    const t = s / steps;
                    const lng = p1[0] + (p2[0] - p1[0]) * t;
                    const lat = p1[1] + (p2[1] - p1[1]) * t;
                    routeCoordinates.push([lng, lat]);
                }
            }
            routeCoordinates.push(coords[coords.length - 1]); // Son noktayı ekle

            currentStepIndex = 0;
            totalSteps = routeCoordinates.length;

            // Alt paneli aktifleştir
            document.getElementById('dashboard-panel').classList.add('active');

            // Simülasyon Loop'unu Başlat
            animateVehicle(duration, distance);
        }

        // ==========================================
        // DİNAMİK NAVİGASYON VE ANİMASYON MOTORU
        // ==========================================
        function animateVehicle(totalDuration, totalDistance) {
            if (currentStepIndex >= totalSteps) {
                endNavigation();
                return;
            }

            const currentPos = routeCoordinates[currentStepIndex];
            vehicleMarker.setLngLat(currentPos);

            // Açı ve Yön Hesaplamaları (Bearing)
            let nextBearing = 0;
            if (currentStepIndex < totalSteps - 1) {
                nextBearing = calculateBearing(currentPos, routeCoordinates[currentStepIndex + 1]);
            } else {
                nextBearing = calculateBearing(routeCoordinates[currentStepIndex - 1], currentPos);
            }

            // Aracın İkonunu Döndür (Kendi ekseninde)
            el.style.transform = `rotate(${nextBearing}deg)`;

            // HUD Yön Okunun Hedefe Göre Açısını Hesapla
            const targetBearing = calculateBearing(currentPos, destinationCoords);
            // Harita açısı (bearing) çıkarılarak ekran referanslı kararlı dönüş sağlanır
            const relativeHUDAngle = targetBearing - map.getBearing();
            document.getElementById('hud-arrow').style.transform = `rotate(${relativeHUDAngle}deg)`;

            // Kamera Takibi ve Yumuşak Dönüş (EaseTo)
            map.easeTo({
                center: currentPos,
                bearing: nextBearing,
                duration: 40,
                pitch: 55,
                zoom: 16.5,
                easing: (t) => t
            });

            // Dinamik Alt Panel Veri Hesaplamaları
            const progressRatio = currentStepIndex / totalSteps;
            const remainingDist = Math.max(0, (totalDistance / 1000) * (1 - progressRatio));
            const remainingTimeSec = Math.max(0, totalDuration * (1 - progressRatio));

            // Gerçekçi NFSU2 Hız Efekti Simülasyonu (Virajlarda yavaşlayan dinamik hız)
            let speed = Math.floor(70 + Math.sin(currentStepIndex * 0.05) * 25);
            if (currentStepIndex < totalSteps - 2) {
                const turnCheck = Math.abs(nextBearing - calculateBearing(routeCoordinates[currentStepIndex + 1], routeCoordinates[currentStepIndex + 2]));
                if (turnCheck > 5) speed = Math.floor(35 + Math.random() * 10); // Virajda frenleme
            }

            // UI Yazdırılması
            document.getElementById('dash-speed').innerHTML = `${speed}<span class="dash-unit">KM/H</span>`;
            document.getElementById('dash-dist').innerHTML = `${remainingDist.toFixed(1)}<span class="dash-unit">KM</span>`;
            document.getElementById('dash-time').textContent = formatTime(remainingTimeSec);

            currentStepIndex += 1;
            animationFrameId = requestAnimationFrame(() => animateVehicle(totalDuration, totalDistance));
        }

        // Navigasyon Bitiş Senaryosu
        function endNavigation() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            document.getElementById('dash-speed').innerHTML = `0<span class="dash-unit">KM/H</span>`;
            document.getElementById('dash-dist').innerHTML = `0.0<span class="dash-unit">KM</span>`;
            
            // Başarı Mesajı Panelini Tetikle
            const notif = document.getElementById('notification-box');
            notif.classList.add('active');

            setTimeout(() => {
                notif.classList.remove('active');
                resetUI();
            }, 4000);
        }

        // Arayüz Sıfırlama ve İlk Konuma Dönüş
        function resetUI() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            document.getElementById('search-container').style.transform = 'translateX(-50%) translateY(0)';
            document.getElementById('dashboard-panel').classList.remove('active');
            document.getElementById('hud-arrow-container').style.display = 'none';
            searchInput.value = '';
            
            // Haritayı Temizle ve Başlangıca Çek
            map.getSource('route').setData({
                type: 'Feature',
                properties: {},
                geometry: { type: 'LineString', coordinates: [] }
            });

            vehicleMarker.setLngLat(startCoords);
            el.style.transform = 'rotate(0deg)';

            map.flyTo({
                center: startCoords,
                zoom: 14,
                pitch: 50,
                bearing: 0,
                duration: 1500
            });
        }

        // ==========================================
        // MATEMATİKSEL UTILS VE COĞRAFİ METRİKLER
        // ==========================================
        
        // İki nokta arasındaki Coğrafi Açıyı (Bearing) veren matematiksel fonksiyon
        function calculateBearing(p1, p2) {
            const lon1 = p1[0] * Math.PI / 180;
            const lat1 = p1[1] * Math.PI / 180;
            const lon2 = p2[0] * Math.PI / 180;
            const lat2 = p2[1] * Math.PI / 180;

            const dLon = lon2 - lon1;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            return (brng + 360) % 360;
        }

        // Kuş uçuşu mesafe formülü (İnterpolasyon hassasiyeti için)
        function getDistance(p1, p2) {
            const R = 6371; // Dünya yarıçapı (km)
            const dLat = (p2[1] - p1[1]) * Math.PI / 180;
            const dLon = (p2[0] - p1[0]) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(p1[1] * Math.PI / 180) * Math.cos(p2[1] * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Saniye cinsinden zamanı Saat:Dakika formatına çevirici
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            
            if (h > 0) {
                return `${h}SA ${m}DK`;
            }
            return `${m} DK`;
        }
    </script>
